# Phase 8 deploy template — used by agents/deploy_agent.js.
# Edit only this file. Do NOT copy/edit elsewhere.
#
# Invocation contract (see D17=A in docs/DECISIONS.md, 2026-05-08):
#   docker-compose --project-directory <project_root> \
#                  -f lib/stack_templates/docker-compose.yml \
#                  up --build
# Therefore all relative paths below resolve against <project_root>.
#
# Decision provenance (docs/DECISIONS.md, 2026-05-08):
#   D7  = C  → ports via .env: DEPLOY_PORT_FE/BE/DB (defaults 5173/3001/3306)
#   D9  = C  → ephemeral MySQL volume + schema.sql init mount (fresh DB per task)
#   D11 = A  → Dockerfile build for BE and FE
#   D13 = A  → Vite dev server for FE (CMD set in FE/Dockerfile)
#   D14 = B  → mysql healthcheck + service_healthy gate
#   D15 = A  → restart: "no" (fail surface immediately)
#   D16 = A  → container env hardcoded here (host .env not propagated)
#   D17 = A  → paths relative to project root (via --project-directory)
#   D18 = A  → image: mysql:8

services:
  mysql:
    image: mysql:8
    labels:
      # Marks this container as "owned" by myFirstAgentApp so pre-cleanup
      # (lib/container_cleanup.js) can sweep it on the next Phase 8 cycle
      # regardless of compose project name (test / finalize / verify-* etc.).
      com.myfirstagentapp.managed: "true"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: myfirstagentapp_db
    ports:
      - "${DEPLOY_PORT_DB:-3306}:3306"
    volumes:
      # D9=C: schema.sql auto-runs on first container start (mysql official image
      # convention). No /var/lib/mysql mount → ephemeral data per task.
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: "no"

  be:
    build:
      context: ./BE
      dockerfile: Dockerfile
    labels:
      com.myfirstagentapp.managed: "true"
    environment:
      # D16=A: hardcoded here — these override anything BE's own dotenv would
      # load inside the container. Host .env is intentionally NOT mounted.
      DB_HOST: mysql              # service name (compose default DNS)
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root           # matches MYSQL_ROOT_PASSWORD above
      DB_NAME: myfirstagentapp_db
      BE_PORT: 3001
    ports:
      - "${DEPLOY_PORT_BE:-3001}:3001"
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"

  fe:
    build:
      context: ./FE
      dockerfile: Dockerfile
    labels:
      com.myfirstagentapp.managed: "true"
    environment:
      # FE vite.config.js의 proxy target. compose 내부 network에서 BE 컨테이너
      # service name 'be'로 접근. 브라우저 fetch가 상대경로 /api/*를 쓸 때
      # Vite dev server가 받아 여기로 forward한다.
      VITE_BE_PROXY_TARGET: http://be:3001
    ports:
      - "${DEPLOY_PORT_FE:-5173}:5173"
    # FE Vite dev server runs in this container. 브라우저는 호스트 5173으로
    # 들어와 vite에 도착하고, vite가 /api/*를 위 VITE_BE_PROXY_TARGET으로
    # forward한다. BE 컨테이너의 외부 expose port(DEPLOY_PORT_BE)는 직접
    # 호출하지 않음 — 브라우저는 같은 origin(5173)으로 비즈니스 API 호출.
    depends_on:
      - be
    restart: "no"
