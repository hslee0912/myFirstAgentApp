# Phase 8 deploy template — used by agents/deploy_agent.js.
# Edit only this file. Do NOT copy/edit elsewhere.
#
# Invocation contract (see D17=A in docs/DECISIONS.md, 2026-05-08):
#   docker-compose --project-directory <project_root> \
#                  -f lib/stack_templates/docker-compose.yml \
#                  up --build
# Therefore all relative paths below resolve against <project_root>, AND
# host .env in <project_root> is auto-loaded by compose for ${var} interpolation.
#
# Decision provenance (docs/DECISIONS.md):
#   D7  = C  → ports via .env: DEPLOY_PORT_FE/BE (defaults 5173/3001)
#   D11 = A  → Dockerfile build for BE and FE
#   D13 = A  → Vite dev server for FE (CMD set in FE/Dockerfile)
#   D15 = A  → restart: "no" (fail surface immediately)
#   D17 = A  → paths relative to project root (via --project-directory)
#   D29 = A  → 단일 host MySQL (BE 컨테이너 → host.docker.internal). 이전의
#              컨테이너 MySQL(D9=C, D14=B, D16=A, D18=A) 결정은 obsolete.
#              사유: 비즈니스 데이터 영구 보존 + DX(단일 GUI 연결) + EC2/RDS
#              prod 패턴 일치.

services:
  be:
    build:
      context: ./BE
      dockerfile: Dockerfile
    labels:
      # Marks this container as "owned" by myFirstAgentApp so pre-cleanup
      # (lib/container_cleanup.js) can sweep it on the next Phase 8 cycle
      # regardless of compose project name (test / finalize / verify-* etc.).
      com.myfirstagentapp.managed: "true"
    environment:
      # D29=A: BE 컨테이너 → 호스트의 MySQL. host .env에서 보간 (compose가
      # --project-directory의 .env를 자동 로드). 빈 값이면 compose가 빈 문자열
      # 그대로 전달 → BE가 인증 실패하며 fail-fast. 사전에 deploy_agent가 host
      # MySQL ping check를 한다.
      DB_HOST: host.docker.internal
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-myfirstagentapp_db}
      BE_PORT: 3001
    extra_hosts:
      # Linux native docker는 host.docker.internal을 자동 resolve 안 함.
      # host-gateway는 Docker 20.10+에서 호스트 IP로 alias 해주는 magic value.
      # Docker Desktop (Win/Mac)에서는 이미 자동 지원하므로 무해.
      - "host.docker.internal:host-gateway"
    # Nginx reverse proxy 환경: 외부 NIC 직접 노출 안 함. 127.0.0.1 binding
    # 으로 호스트 내부에서만 접근 가능 (Nginx가 /api/v1/* → 여기로 forward).
    # 외부에서 :3001 직접 접근은 SG 차단 + 이제 OS 인터페이스에서도 차단.
    ports:
      - "127.0.0.1:${DEPLOY_PORT_BE:-3001}:3001"
    restart: "no"

  fe:
    build:
      context: ./FE
      dockerfile: Dockerfile
    labels:
      com.myfirstagentapp.managed: "true"
    environment:
      # (Legacy) Vite dev server의 proxy target — Nginx 도입 후 더 이상 사용 X.
      # 보존 사유: BE Agent prompt나 cycle 환경에서 참조할 수 있어 호환성 유지.
      # 현재 라우팅: 브라우저 → Nginx :80 /api/v1/* → BE 컨테이너 :3001 (직접).
      VITE_BE_PROXY_TARGET: http://be:3001
    # Nginx reverse proxy 환경: 외부 NIC 직접 노출 X. 127.0.0.1 binding으로
    # 호스트 내부에서만. Nginx가 /demo/* → 여기로 forward (Vite HMR WebSocket 포함).
    ports:
      - "127.0.0.1:${DEPLOY_PORT_FE:-5173}:5173"
    # 브라우저는 Nginx :80 → /demo/ path로 FE에 도달. Vite는 base='/demo/'로
    # 정적 자산 import를 그 prefix에 맞춰 빌드 (vite.config.js 참조).
    # 비즈니스 API는 Vite proxy가 아닌 Nginx의 /api/v1/* → BE로 직결.
    depends_on:
      - be
    restart: "no"

# D93 (2026-05-20): docker-compose가 cycle마다 random subnet을 잡는 패턴이 발견됨
#   (예: 192.168.0.0/20 → UFW 3306 룰 172.16.0.0/12 밖이라 BE→MySQL ETIMEDOUT).
#   고정 subnet 172.20.0.0/16 으로 두면 매 cycle 같은 대역 → UFW 룰과 항상 매칭.
#   172.16.0.0/12 안에 들어가는 안전한 값.
networks:
  default:
    ipam:
      config:
        - subnet: 172.20.0.0/16
