<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Server injects .env PUBLIC_HOST here at request time. The literal
       __PUBLIC_HOST__ is the placeholder served from disk (only visible if
       someone reads the file directly); the actual response substitutes it. -->
  <meta name="public-host" content="__PUBLIC_HOST__" />
  <title>myFirstAgentApp — control panel</title>
  <style>
    :root {
      --bg: #0f1116;
      --panel: #181b22;
      --panel-2: #1f232c;
      --text: #e2e6ee;
      --muted: #8089a0;
      --accent: #6ea8ff;
      --pass: #4ade80;
      --fail: #ef4444;
      --warn: #fbbf24;
      --border: #2a2f3a;

      /* Area chip colours (label-level identification) */
      --area-orchestrator: #6b7280;
      --area-codechecker:  #a78bfa;
      --area-be:           #4ade80;
      --area-fe:           #6ea8ff;
      --area-lint:         #fbbf24;
      --area-deploy:       #38bdf8;
      --area-posttest:     #f472b6;

      /* Severity colours (box-level — error/warn/info/ok) */
      --sev-error-fg: #ef4444;
      --sev-error-bg: rgba(239, 68, 68, 0.10);
      --sev-warn-fg:  #fb923c;
      --sev-warn-bg:  rgba(251, 146, 60, 0.10);
      --sev-info-fg:  #fbbf24;
      --sev-info-bg:  rgba(251, 191, 36, 0.09);
      --sev-ok-fg:    #4ade80;
      --sev-ok-bg:    rgba(74, 222, 128, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { margin: 0; font-size: 16px; font-weight: 600; }
    header .muted { color: var(--muted); font-size: 12px; }
    .grid {
      display: grid;
      grid-template-columns: 460px 1fr;
      gap: 16px;
      padding: 16px;
    }
    @media (max-width: 1000px) { .grid { grid-template-columns: 1fr; } }
    section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }
    section h2 {
      margin: 0 0 10px 0;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    label { display: block; margin: 6px 0; font-size: 12px; color: var(--muted); }
    input[type="text"], textarea, select {
      width: 100%;
      padding: 7px 9px;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font: inherit;
    }
    textarea { resize: vertical; min-height: 80px; }
    button {
      padding: 7px 12px;
      background: var(--accent);
      color: #0a0d14;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .row { display: flex; gap: 8px; align-items: center; }
    .row > * { flex: 1; }
    .row > button { flex: 0; }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
    }
    .pill.PASS, .pill.SUCCESS { background: var(--pass); color: #0a0d14; }
    .pill.FAIL, .pill.FAILED { background: var(--fail); color: #fff; }
    .pill.ERROR { background: var(--fail); color: #fff; }
    .pill.IN_PROGRESS, .pill.RUNNING, .pill.PENDING { background: var(--warn); color: #0a0d14; }
    pre {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      overflow-x: auto;
      font-size: 12px;
      max-height: 360px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; }
    tr.clickable { cursor: pointer; }
    tr.clickable:hover { background: var(--panel-2); }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .status { font-size: 12px; color: var(--muted); }
    .timeline { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
    .phase {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
    }
    .phase .label { flex: 1; }
    .phase .ts { color: var(--muted); font-size: 11px; }

    /* ───── Area chip — colours the agent name with its area colour ───── */
    .area-chip {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #0a0d14;
      flex: 0 0 auto;
    }
    .area-chip.orchestrator { background: var(--area-orchestrator); color: #fff; }
    .area-chip.codechecker  { background: var(--area-codechecker); color: #fff; }
    .area-chip.be           { background: var(--area-be); }
    .area-chip.fe           { background: var(--area-fe); }
    .area-chip.lint         { background: var(--area-lint); }
    .area-chip.deploy       { background: var(--area-deploy); }
    .area-chip.posttest     { background: var(--area-posttest); }

    /* ───── Error / warning card (severity-coloured box) ───── */
    .err-card {
      margin: 10px 0;
      border: 1px solid var(--border);
      border-left: 4px solid var(--border);
      border-radius: 6px;
      background: var(--panel-2);
      padding: 12px 14px;
    }
    .err-card.sev-error { border-left-color: var(--sev-error-fg); background: var(--sev-error-bg); }
    .err-card.sev-warn  { border-left-color: var(--sev-warn-fg);  background: var(--sev-warn-bg); }
    .err-card.sev-info  { border-left-color: var(--sev-info-fg);  background: var(--sev-info-bg); }
    .err-card.sev-ok    { border-left-color: var(--sev-ok-fg);    background: var(--sev-ok-bg); }

    .err-card .err-head {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 6px;
      font-size: 13px; font-weight: 600;
    }
    .err-card .err-title { flex: 1; }
    .err-card .err-body { font-size: 12px; color: var(--text); }
    .err-card .err-body p { margin: 4px 0; }
    .err-card .err-body code,
    .err-card .err-body kbd {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      background: var(--panel);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 11px;
    }
    .err-card .err-reco {
      margin-top: 8px;
      padding: 6px 10px;
      background: rgba(255,255,255,0.04);
      border-left: 2px solid var(--muted);
      border-radius: 3px;
      font-size: 12px;
      color: var(--muted);
    }
    .err-card .err-reco b { color: var(--text); }

    /* ───── Expandable / collapsible disclosure ───── */
    details.disclosure {
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--panel-2);
    }
    details.disclosure > summary {
      cursor: pointer;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--muted);
      user-select: none;
    }
    details.disclosure[open] > summary { color: var(--text); border-bottom: 1px solid var(--border); }
    details.disclosure > .disclosure-body { padding: 8px 10px; }

    /* ───── Monospace code block for logs / stack traces ───── */
    .code-block {
      background: #0a0d14;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      line-height: 1.5;
      max-height: 320px;
      overflow: auto;
      white-space: pre;
      color: #c8d2e0;
    }
    .code-block.wrap { white-space: pre-wrap; word-break: break-word; }
    .code-block .dim { color: var(--muted); }

    /* ───── Run row v2 (timeline) ───── */
    .run-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-left-width: 3px;
      border-radius: 6px;
      font-size: 12px;
    }
    .run-row.sev-error { border-left-color: var(--sev-error-fg); }
    .run-row.sev-warn  { border-left-color: var(--sev-warn-fg); }
    .run-row.sev-info  { border-left-color: var(--sev-info-fg); }
    .run-row.sev-ok    { border-left-color: var(--sev-ok-fg); }
    .run-row .name { font-weight: 600; }
    .run-row .target { color: var(--muted); font-size: 11px; }
    .run-row .ts { color: var(--muted); font-size: 11px; margin-left: auto; }

    .timeline { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }

    /* ───── Tiny meta-row chips for silent warnings on SUCCESS runs ───── */
    .meta-chip {
      display: inline-block;
      margin: 2px 4px 2px 0;
      padding: 2px 7px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 3px;
      font-size: 11px;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .meta-chip.warn { color: var(--sev-warn-fg); border-color: var(--sev-warn-fg); }
  </style>
</head>
<body>
  <header>
    <h1>myFirstAgentApp</h1>
    <span class="muted">control panel (Phase 1~9 시각화 · .env GUI editor · 단일 실행 큐)</span>
  </header>

  <div class="grid">
    <section>
      <h2>새 실행</h2>
      <label for="prompt">user_request (비우면 기본 시나리오)</label>
      <textarea id="prompt" placeholder="이메일과 비밀번호로 회원가입할 수 있는 기능을 만들어줘..."></textarea>
      <div class="toolbar" style="margin-top: 8px;">
        <button id="runBtn">▶ Run pipeline</button>
        <button id="redeployBtn" class="secondary" title="현재 worktree 코드 그대로 docker compose up (PostTest 안 함)">🚀 Redeploy</button>
        <button id="resetDbBtn" class="secondary">⟲ reset-db</button>
        <button id="refreshBtn" class="secondary">↻ Refresh</button>
        <button id="rollbackBtn" class="secondary" style="border-color: var(--fail); color: var(--fail);" title="git reset --hard origin/main + git clean + .env reset">⏮ Reset to origin/main</button>
      </div>
      <div class="status" id="runStatus">idle</div>

      <h2 style="margin-top: 18px;">.env 토글</h2>
      <div id="envEditor"></div>
    </section>

    <section>
      <h2>최근 task (클릭하면 상세)</h2>
      <table id="taskTable">
        <thead><tr><th>id</th><th>task_id</th><th>verdict</th><th>updated_at</th></tr></thead>
        <tbody></tbody>
      </table>

      <h2 style="margin-top: 18px;">상세 — <span id="detailTaskId" class="muted">(선택 안 됨)</span></h2>
      <div id="detail"></div>
    </section>
  </div>

<script>
const $ = (sel) => document.querySelector(sel);
const fmtTime = (ts) => ts ? new Date(ts).toLocaleString() : '';
const pill = (val) => val ? `<span class="pill ${val}">${val}</span>` : '';

let selectedTaskId = null;

// Browser host for FE/BE service links. Initial value comes from the
// <meta name="public-host"> that ui/server.js injects per request (from
// .env PUBLIC_HOST). loadEnv() refreshes it on every poll so a UI toggle
// propagates without a page reload. The meta fallback "__PUBLIC_HOST__"
// is what you'd see only if the file is opened from disk (i.e. not via
// the UI server) — treat that as "host unknown, do not link out".
let PUBLIC_HOST =
  document.querySelector('meta[name="public-host"]')?.content || '';
if (PUBLIC_HOST === '__PUBLIC_HOST__') PUBLIC_HOST = '';

async function fetchJSON(url, opts) {
  const r = await fetch(url, opts);
  const ct = r.headers.get('content-type') || '';
  if (!ct.includes('json')) {
    return { _status: r.status, _text: await r.text() };
  }
  return r.json();
}

// 3-state toggle keys: each maps an on/off checkbox to two string values.
// Anything else falls back to the text+save row layout below.
const TOGGLE_KEYS = {
  COMMIT_MODE:              { on: 'auto', off: 'manual' },
  VALIDATION_MODE:          { on: 'on',   off: 'off' },
  DEPLOY_MODE:              { on: 'on',   off: 'off' },
  DEPLOY_TEARDOWN_ON_PASS:  { on: 'on',   off: 'off' },
};

async function putEnv(key, value) {
  return fetchJSON('/api/env', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ [key]: value }),
  });
}

async function loadEnv() {
  const data = await fetchJSON('/api/env');
  // Refresh PUBLIC_HOST so subsequent FE/BE links pick up any UI edit
  // (or .env reset) without requiring a page reload.
  if (data.editable && data.editable.PUBLIC_HOST) {
    PUBLIC_HOST = data.editable.PUBLIC_HOST;
  }
  const root = $('#envEditor');
  root.innerHTML = '';

  // Toggle row at the top — checked = "on value", unchecked = "off value".
  // change event writes to .env immediately.
  for (const k of data.editableKeys) {
    if (!TOGGLE_KEYS[k]) continue;
    const t = TOGGLE_KEYS[k];
    const val = data.editable[k] ?? '';
    const checked = val === t.on;
    const wrap = document.createElement('div');
    wrap.className = 'row';
    wrap.style.marginBottom = '4px';
    wrap.innerHTML =
      `<label style="flex:0 0 200px; margin:0; font-family: ui-monospace, monospace;">${k}</label>` +
      `<label style="flex:1; display:flex; align-items:center; gap:8px; margin:0;">` +
        `<input type="checkbox" data-toggle="${k}" ${checked ? 'checked' : ''} />` +
        `<span data-toggle-value="${k}" style="font-family: ui-monospace, monospace; color: var(--muted); font-size: 12px;">${checked ? t.on : t.off}</span>` +
      `</label>` +
      `<span data-toggle-status="${k}" class="status" style="flex:0 0 60px; text-align:right;"></span>`;
    root.appendChild(wrap);
  }

  // The remaining keys (models, ports, retries, ...) keep the text+save layout.
  for (const k of data.editableKeys) {
    if (TOGGLE_KEYS[k]) continue;
    const val = data.editable[k] ?? '';
    const wrap = document.createElement('div');
    wrap.className = 'row';
    wrap.style.marginBottom = '4px';
    wrap.innerHTML =
      `<label style="flex:0 0 200px; margin:0; font-family: ui-monospace, monospace;">${k}</label>` +
      `<input type="text" data-key="${k}" value="${val.replace(/"/g, '&quot;')}" />` +
      `<button class="secondary" data-save="${k}">save</button>`;
    root.appendChild(wrap);
  }

  // Wire toggle change → immediate PUT.
  root.querySelectorAll('input[data-toggle]').forEach((cb) => {
    cb.addEventListener('change', async () => {
      const key = cb.getAttribute('data-toggle');
      const t = TOGGLE_KEYS[key];
      const value = cb.checked ? t.on : t.off;
      const valueEl = root.querySelector(`[data-toggle-value="${key}"]`);
      const statusEl = root.querySelector(`[data-toggle-status="${key}"]`);
      cb.disabled = true;
      statusEl.textContent = 'saving…';
      try {
        const res = await putEnv(key, value);
        if (res.ok) {
          valueEl.textContent = value;
          statusEl.textContent = '✓ saved';
        } else {
          // Revert checkbox state on failure.
          cb.checked = !cb.checked;
          statusEl.textContent = '✗ fail';
        }
      } catch (_) {
        cb.checked = !cb.checked;
        statusEl.textContent = '✗ fail';
      } finally {
        cb.disabled = false;
        setTimeout(() => { statusEl.textContent = ''; }, 1500);
      }
    });
  });

  // Wire text+save buttons (unchanged behavior).
  root.querySelectorAll('button[data-save]').forEach((btn) => {
    btn.addEventListener('click', async () => {
      const key = btn.getAttribute('data-save');
      const input = root.querySelector(`input[data-key="${key}"]`);
      const value = input.value;
      btn.disabled = true;
      try {
        const res = await putEnv(key, value);
        if (res.ok) {
          btn.textContent = 'saved';
          setTimeout(() => { btn.textContent = 'save'; btn.disabled = false; }, 1200);
        } else {
          btn.textContent = 'fail';
          setTimeout(() => { btn.textContent = 'save'; btn.disabled = false; }, 1500);
        }
      } catch (_) { btn.disabled = false; }
    });
  });
}

async function loadTasks() {
  const data = await fetchJSON('/api/tasks');
  const tbody = $('#taskTable tbody');
  tbody.innerHTML = '';
  for (const t of (data.tasks || [])) {
    const tr = document.createElement('tr');
    tr.className = 'clickable';
    tr.innerHTML =
      `<td>${t.id}</td>` +
      `<td style="font-family: ui-monospace, monospace; font-size: 11px;">${t.task_id}</td>` +
      `<td>${pill(t.final_verdict)}</td>` +
      `<td class="muted">${fmtTime(t.updated_at)}</td>`;
    tr.addEventListener('click', () => selectTask(t.task_id));
    tbody.appendChild(tr);
  }
}

function selectTask(task_id) {
  selectedTaskId = task_id;
  $('#detailTaskId').textContent = task_id;
  loadDetail();
}

// ─────────── Detail panel helpers ───────────

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function safeJson(v) {
  if (v == null) return null;
  if (typeof v === 'object') return v;
  try { return JSON.parse(v); } catch (_) { return null; }
}

/** Area chip class for a (agent_name, target) pair. */
function areaClass(agent, target) {
  const a = String(agent || '').toLowerCase();
  if (a === 'be' || (a === 'lint' && target === 'BE')) return a === 'lint' ? 'lint' : 'be';
  if (a === 'fe' || (a === 'lint' && target === 'FE')) return a === 'lint' ? 'lint' : 'fe';
  if (a === 'orchestrator') return 'orchestrator';
  if (a === 'codechecker')  return 'codechecker';
  if (a === 'deploy')       return 'deploy';
  if (a === 'posttest')     return 'posttest';
  return 'orchestrator';
}

/** Classify a FAILED log_agent_runs row → severity / category / label / recommendation. */
function classifyRunError(run) {
  const oj = safeJson(run.output_json) || {};
  const err = String(oj.error || '');
  const stack = String(oj.stack || '');
  const all = err + '\n' + stack;

  // UNAUTHORIZED_DEPS — validateAllowedDeps throw
  if (/UNAUTHORIZED_DEPS/i.test(all) || /Unauthorized dependencies/i.test(err)) {
    const m = err.match(/Unauthorized dependencies detected:\s*([^.]+)\./i);
    return {
      severity: 'error',
      category: 'UNAUTHORIZED_DEPS',
      label: '🚫 미허가 의존성 (allowedDeps 위반)',
      detail: m ? m[1].trim() : err,
      recommendation: 'rules/*.md에 그 패키지 명시 금지 추가하거나, 정말 필요하면 lib/stack.config.json의 allowedDeps 확장. 보통은 prompt를 더 명확히 — bcrypt vs bcryptjs 같은 함정은 rules에 NOT 표기 추가.',
    };
  }
  // validatePaths throw — protected file or outside BE/FE
  if (/protected stack config file/i.test(all) || /Disallowed path/i.test(all) || /not in allowed_paths/i.test(all)) {
    return {
      severity: 'error',
      category: 'PROTECTED_PATH',
      label: '🛡 Protected 파일 / 영역 침범',
      detail: err,
      recommendation: 'LLM이 package.json·vite.config·.eslintrc 같은 보호 파일에 쓰려 함. rules/common.md §9 보호 파일 항목 강조 또는 lib/stack.config.json protectedConfigFiles 점검.',
    };
  }
  // LLM_TRUNCATED — callJSON throws this
  if (/LLM_TRUNCATED/i.test(all) || /TRUNCATED after/i.test(err)) {
    return {
      severity: 'warn',
      category: 'LLM_TRUNCATED',
      label: '✂️ LLM 응답 잘림 (max_tokens 초과)',
      detail: err,
      recommendation: 'agent별 max_tokens 증가 또는 prompt 단축. lib/llm.js의 Continuation pattern이 3회 누적 후에도 실패하면 여기 도달.',
    };
  }
  // JSON parse fail
  if (/did not return valid JSON/i.test(all) || /JSON.*parse/i.test(all)) {
    return {
      severity: 'warn',
      category: 'JSON_PARSE_FAIL',
      label: '📝 LLM JSON 응답 파싱 실패',
      detail: err,
      recommendation: 'callJSON에 retry layer 있음 — 그래도 실패면 raw 응답 dump 위치 확인 (Temp 디렉터리). prompt에 escape 가이드 강화 가능.',
    };
  }
  // Docker not installed
  if (/Docker CLI not installed/i.test(all) || /Docker Compose not available/i.test(all)) {
    return {
      severity: 'error',
      category: 'DOCKER_MISSING',
      label: '🐳 Docker 미설치 / 미실행',
      detail: err,
      recommendation: 'Docker Desktop 설치 + 실행 확인. 또는 .env에서 DEPLOY_MODE=off로 Phase 8/9 skip.',
    };
  }
  // Generic agent exception
  return {
    severity: 'error',
    category: 'AGENT_EXCEPTION',
    label: '❌ Agent 예외',
    detail: err || '(no error message)',
    recommendation: 'output_json.stack을 펼쳐 자세한 호출 위치 확인.',
  };
}

/** Deploy/PostTest run's failed_stage → label. */
function classifyDeployStage(failedStage) {
  switch (failedStage) {
    case 'docker_check':       return { label: '🐳 Docker 미설치', sev: 'error' };
    case 'port_preflight':     return { label: '🔌 Port 충돌 (fallback 한계 초과)', sev: 'error' };
    case 'compose_up':         return { label: '🐳 compose up 실패', sev: 'error' };
    case 'compose_up_timeout': return { label: '⏱ compose up timeout', sev: 'error' };
    default:                   return { label: failedStage || 'Deploy 실패', sev: 'error' };
  }
}

/** Lint failed_stage → label. */
function classifyLintStage(failedStage) {
  switch (failedStage) {
    case 'STAGE1': return { label: '🔧 Lint Stage 1 (eslint) 실패', sev: 'info', retryable: true };
    case 'STAGE2': return { label: '🔧 Lint Stage 2 (build/syntax) 실패', sev: 'info', retryable: true };
    case 'STAGE3': return { label: '🧪 Lint Stage 3 (tests) 실패 — retry 없음', sev: 'error', retryable: false };
    default:       return { label: failedStage || 'Lint 실패', sev: 'warn', retryable: false };
  }
}

/** Render a single error card. */
function renderErrCard(c) {
  const detailHtml = c.detail
    ? `<div class="err-body"><p><code>${esc(c.detail)}</code></p></div>`
    : '';
  const recoHtml = c.recommendation
    ? `<div class="err-reco"><b>권장 대응:</b> ${esc(c.recommendation)}</div>`
    : '';
  return `
    <div class="err-card sev-${c.severity}">
      <div class="err-head">
        <span class="err-title">${esc(c.label)}</span>
      </div>
      ${detailHtml}
      ${recoHtml}
    </div>`;
}

/** Render a code block disclosure for big text (stdout/stderr/stack). */
function renderCodeDisclosure(summary, text, opts = {}) {
  if (!text || !String(text).trim()) return '';
  const wrapCls = opts.wrap === false ? '' : ' wrap';
  return `
    <details class="disclosure">
      <summary>${esc(summary)}</summary>
      <div class="disclosure-body"><div class="code-block${wrapCls}">${esc(text)}</div></div>
    </details>`;
}

/** Render meta chips for silent warnings on SUCCESS Agent runs. */
function renderMetaChips(oj) {
  const chips = [];
  if (Array.isArray(oj.dropped_protected) && oj.dropped_protected.length) {
    chips.push(`<span class="meta-chip warn" title="LLM 응답에 protected file 있었지만 silent drop됨">drop_protected: ${oj.dropped_protected.length}</span>`);
  }
  if (Array.isArray(oj.dropped_tests) && oj.dropped_tests.length) {
    chips.push(`<span class="meta-chip" title="LLM이 만든 test 파일은 시스템이 결정론적으로 자동 생성하므로 silent drop됨">drop_tests: ${oj.dropped_tests.length}</span>`);
  }
  if (Array.isArray(oj.auto_generated_tests) && oj.auto_generated_tests.length) {
    chips.push(`<span class="meta-chip" title="lib/test_codegen.js가 결정론적으로 만든 smoke test">auto_tests: ${oj.auto_generated_tests.length}</span>`);
  }
  if (oj.eslintrc_created) {
    chips.push(`<span class="meta-chip">eslintrc 생성</span>`);
  }
  if (oj.skipped) {
    chips.push(`<span class="meta-chip">skipped: ${esc(oj.skipped)}</span>`);
  }
  if (oj.ports_changed) {
    chips.push(`<span class="meta-chip warn" title="port preflight fallback 발생">ports_changed</span>`);
  }
  return chips.length > 0 ? `<div style="margin-top: 4px;">${chips.join(' ')}</div>` : '';
}

/** Render the most-critical error summary card on top (Layer 1). */
function renderTopErrorSummary(decision, states, runs) {
  if (!decision) return '';
  if (decision.final_verdict !== 'ERROR' && decision.final_verdict !== 'FAIL') return '';

  // Pick the first FAILED log_agent_runs row — that's the exception path.
  const failedRun = (runs || []).find((r) => r.status === 'FAILED');
  if (failedRun) {
    const c = classifyRunError(failedRun);
    const area = areaClass(failedRun.agent_name, failedRun.target);
    const tgt = failedRun.target ? ' / ' + failedRun.target : '';
    return `
      <div class="err-card sev-${c.severity}" style="margin-top: 10px;">
        <div class="err-head">
          <span class="area-chip ${area}">${esc(failedRun.agent_name)}${esc(tgt)}</span>
          <span class="err-title">${esc(c.label)}</span>
        </div>
        ${c.detail ? `<div class="err-body"><p><code>${esc(c.detail)}</code></p></div>` : ''}
        ${c.recommendation ? `<div class="err-reco"><b>권장 대응:</b> ${esc(c.recommendation)}</div>` : ''}
      </div>`;
  }

  // No exception → FAIL from Lint stage3 or retry exhaustion. Surface the
  // first FAILED task_state.
  const failedState = (states || []).find((s) => s.status === 'FAILED');
  if (failedState) {
    const c = classifyLintStage(failedState.failed_stage);
    return `
      <div class="err-card sev-${c.sev}" style="margin-top: 10px;">
        <div class="err-head">
          <span class="area-chip lint">Lint / ${esc(failedState.target)}</span>
          <span class="err-title">${esc(c.label)} (retry ${failedState.retry_count})</span>
        </div>
        <div class="err-body"><p>실패한 영역: <code>${esc(failedState.target)}</code></p></div>
        <div class="err-reco"><b>권장 대응:</b> ${c.retryable
          ? 'retry로 자동 회복 시도 중. retry_count가 MAX(3) 도달하면 verdict=FAIL.'
          : 'Stage 3 (tests) 실패는 retry 없이 즉시 FAIL. 비즈니스 로직 점검 필요.'}</div>
      </div>`;
  }

  // Fallback — generic.
  if (decision.final_result_text) {
    return `
      <div class="err-card sev-error" style="margin-top: 10px;">
        <div class="err-head"><span class="err-title">${esc(decision.final_verdict)}</span></div>
        <div class="err-body"><div class="code-block wrap">${esc(decision.final_result_text)}</div></div>
      </div>`;
  }
  return '';
}

/** Render the run timeline (Layer 2) — each row coloured by severity + area chip + expand. */
function renderTimeline(runs) {
  if (!runs || runs.length === 0) return '';
  const rows = runs.map((r, idx) => {
    const oj = safeJson(r.output_json) || {};
    const area = areaClass(r.agent_name, r.target);
    const tgt = r.target ? `<span class="target">/ ${esc(r.target)}</span>` : '';
    const sev = r.status === 'FAILED' ? 'sev-error'
              : r.status === 'RUNNING' ? 'sev-info'
              : 'sev-ok';
    const ts = `${fmtTime(r.started_at)} → ${r.ended_at ? fmtTime(r.ended_at) : '...'}`;

    let expand = '';
    if (r.status === 'FAILED') {
      // Exception path — render full error card + stack disclosure
      const c = classifyRunError(r);
      expand += renderErrCard(c);
      if (oj.stack) expand += renderCodeDisclosure('▼ stack trace', oj.stack, { wrap: true });

      // Deploy-specific: failed_stage + compose_output + per-service logs
      if (r.agent_name === 'Deploy') {
        const ds = classifyDeployStage(oj.failed_stage);
        expand += `<div class="err-card sev-${ds.sev}"><div class="err-head"><span class="err-title">${esc(ds.label)}</span></div></div>`;
        if (oj.compose_output) expand += renderCodeDisclosure('▼ compose output (tail)', oj.compose_output);
        if (oj.logs) {
          for (const svc of Object.keys(oj.logs)) {
            if (oj.logs[svc]) expand += renderCodeDisclosure(`▼ logs.${svc}`, oj.logs[svc]);
          }
        }
      }
      // PostTest-specific: per-endpoint trace
      if (r.agent_name === 'PostTest' && Array.isArray(oj.results)) {
        for (const ep of oj.results) {
          if (ep.pass) continue;
          const errs = (ep.errors || []).map((e) => `• ${esc(e)}`).join('<br>');
          const trace = ep.trace || {};
          expand += `
            <div class="err-card sev-error">
              <div class="err-head"><span class="area-chip posttest">PostTest</span><span class="err-title">${esc(ep.method || '')} ${esc(ep.endpoint || '')}</span></div>
              <div class="err-body">
                <p>url: <code>${esc(trace.url || '')}</code></p>
                <p>status: <code>${esc(trace.status)}</code></p>
                ${errs ? `<p>${errs}</p>` : ''}
                ${trace.request_body  ? renderCodeDisclosure('▼ request body',  JSON.stringify(trace.request_body, null, 2))  : ''}
                ${trace.response_body ? renderCodeDisclosure('▼ response body', JSON.stringify(trace.response_body, null, 2)) : ''}
              </div>
            </div>`;
        }
      }
    } else if (r.status === 'SUCCESS') {
      // Layer 3: silent warnings as chips
      const chips = renderMetaChips(oj);
      if (chips) expand += chips;
      // Compact summary for Deploy / PostTest success
      if (r.agent_name === 'Deploy' && oj.ports) {
        expand += `<div class="muted" style="font-size:11px; margin-top:4px;">ports: mysql=${oj.ports.mysql} be=${oj.ports.be} fe=${oj.ports.fe} · up in ${oj.duration_ms}ms</div>`;
      }
      if (r.agent_name === 'PostTest' && oj.total != null) {
        expand += `<div class="muted" style="font-size:11px; margin-top:4px;">${oj.passed}/${oj.total} endpoints · ${oj.duration_ms}ms · baseUrl=${esc(oj.baseUrl || '')}</div>`;
      }
    }

    const expandWrapped = expand
      ? `<details class="disclosure" data-runidx="${idx}"><summary>상세 보기</summary><div class="disclosure-body">${expand}</div></details>`
      : '';

    return `
      <div class="run-row ${sev}">
        <span class="area-chip ${area}">${esc(r.agent_name)}</span>
        ${tgt}
        <span>${pill(r.status)}</span>
        <span class="ts">${ts}</span>
      </div>
      ${expandWrapped}`;
  });
  return `<h2 style="margin-top: 14px;">타임라인 (Phase 1~9)</h2><div class="timeline">${rows.join('')}</div>`;
}

/** Render task_state rows with stage_logs disclosure (Lint stage details). */
function renderStates(states) {
  if (!states || states.length === 0) return '';
  const rows = states.map((s) => {
    const cls = areaClass('lint', s.target);
    const sev = s.status === 'FAILED' ? 'sev-error'
              : s.status === 'SUCCESS' ? 'sev-ok'
              : 'sev-info';
    let detail = '';
    if (s.status === 'FAILED') {
      const ls = classifyLintStage(s.failed_stage);
      const sl = safeJson(s.stage_logs);
      detail += `<div class="err-card sev-${ls.sev}"><div class="err-head"><span class="err-title">${esc(ls.label)} · retry ${s.retry_count}/3</span></div></div>`;
      if (sl) {
        for (const stage of ['stage1', 'stage2', 'stage3']) {
          const x = sl[stage];
          if (!x) continue;
          const head = `${stage}: ${x.pass ? '✓ pass' : '✗ fail'} · exit ${x.code} · ${esc(x.cmd || '')}`;
          let body = '';
          if (x.stdout) body += `<b>stdout:</b><div class="code-block">${esc(x.stdout)}</div>`;
          if (x.stderr) body += `<b>stderr:</b><div class="code-block">${esc(x.stderr)}</div>`;
          detail += `<details class="disclosure"${x.pass ? '' : ' open'}><summary>${head}</summary><div class="disclosure-body">${body || '<span class="dim">(empty)</span>'}</div></details>`;
        }
      }
      if (s.fix_instructions) {
        detail += renderCodeDisclosure('▼ 다음 라운드 BE/FE Agent에 전달될 fix_instructions', s.fix_instructions);
      }
    }
    return `
      <div class="run-row ${sev}">
        <span class="area-chip ${cls}">Lint</span>
        <span class="target">/ ${esc(s.target)}</span>
        <span>${pill(s.status)}</span>
        <span class="target">retry ${s.retry_count}${s.failed_stage ? ' · ' + esc(s.failed_stage) : ''}</span>
        <span class="ts">${fmtTime(s.updated_at)}</span>
      </div>
      ${detail ? `<details class="disclosure" open><summary>Lint 상세</summary><div class="disclosure-body">${detail}</div></details>` : ''}`;
  });
  return `<h2 style="margin-top: 14px;">TASK_STATE (영역별)</h2><div class="timeline">${rows.join('')}</div>`;
}

async function loadDetail() {
  if (!selectedTaskId) return;
  const data = await fetchJSON(`/api/tasks/${encodeURIComponent(selectedTaskId)}`);
  const root = $('#detail');
  const { decision, states, runs } = data;

  let html = '';
  if (decision) {
    html += `<div><b>verdict:</b> ${pill(decision.final_verdict)} ` +
            `<span class="muted">${fmtTime(decision.updated_at)}</span></div>`;
  } else {
    html += '<div class="muted">(no decision row)</div>';
  }

  // Layer 1 — top-of-panel error summary
  html += renderTopErrorSummary(decision, states, runs);

  // Deploy run with ports → "FE/BE 열기" + "Stop containers" strip (existing).
  const deployRun = (runs || []).find((r) => r.agent_name === 'Deploy' && r.status === 'SUCCESS');
  if (deployRun) {
    const oj = safeJson(deployRun.output_json) || {};
    if (oj.ports && !oj.skipped) {
      const { fe, be } = oj.ports;
      html += `
        <div class="err-card sev-ok" style="margin-top: 10px;">
          <div class="err-head"><span class="err-title">배포된 서비스 (DEPLOY_TEARDOWN_ON_PASS=off일 때 PASS 후에도 유지)</span></div>
          <div class="err-body">
            <a href="http://${PUBLIC_HOST}:${fe}" target="_blank" rel="noopener" style="margin-right: 12px; color: var(--accent); font-weight: 600;">🌐 FE 열기 (:${fe})</a>
            <a href="http://${PUBLIC_HOST}:${be}" target="_blank" rel="noopener" style="margin-right: 12px; color: var(--accent); font-weight: 600;">🔌 BE 열기 (:${be})</a>
            <button class="secondary" id="stopContainersBtn" style="margin-left: 6px;">🛑 Stop containers</button>
          </div>
        </div>`;
    }
  }

  // Layer 2 — timeline with per-run area chip + severity colour + expand
  html += renderTimeline(runs);

  // task_state rows (Lint) with stage_logs disclosure
  html += renderStates(states);

  root.innerHTML = html;

  // Bind Stop containers button if it was rendered.
  const stopBtn = document.getElementById('stopContainersBtn');
  if (stopBtn) {
    stopBtn.addEventListener('click', async () => {
      if (!confirm('현재 워크트리의 docker compose down 실행. 계속할까요?')) return;
      stopBtn.disabled = true;
      stopBtn.textContent = '🛑 stopping…';
      try {
        const r = await fetchJSON('/api/stop-containers', { method: 'POST' });
        stopBtn.textContent = r.ok ? '🛑 stopped' : '🛑 failed';
      } catch (_) { stopBtn.textContent = '🛑 failed'; }
      setTimeout(() => { stopBtn.disabled = false; stopBtn.textContent = '🛑 Stop containers'; }, 1800);
    });
  }
}

async function pollRunStatus() {
  const r = await fetchJSON('/api/run');
  if (r.running) {
    const cur = r.current || {};
    const elapsed = cur.startedAt ? Math.round((Date.now() - cur.startedAt) / 1000) : 0;
    $('#runStatus').innerHTML =
      `<span class="pill RUNNING">RUNNING</span> pid=${cur.pid || '?'} ` +
      `task_id=${cur.task_id || '(starting...)'} ` +
      `elapsed=${elapsed}s`;
    $('#runBtn').disabled = true;
    if (cur.task_id && cur.task_id !== selectedTaskId) selectTask(cur.task_id);
  } else {
    $('#runStatus').textContent = 'idle';
    $('#runBtn').disabled = false;
  }
}

$('#runBtn').addEventListener('click', async () => {
  $('#runBtn').disabled = true;
  const prompt = $('#prompt').value;
  const r = await fetchJSON('/api/run', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt }),
  });
  if (!r.ok && r._status === 409) {
    $('#runStatus').textContent = 'busy — another run is already executing';
  }
});

$('#resetDbBtn').addEventListener('click', async () => {
  if (!confirm('app_users + log_* 모두 truncate합니다. 계속할까요?')) return;
  $('#resetDbBtn').disabled = true;
  const r = await fetchJSON('/api/reset-db', { method: 'POST' });
  $('#resetDbBtn').disabled = false;
  $('#resetDbBtn').textContent = r.ok ? '⟲ reset-db (done)' : '⟲ reset-db (fail)';
  setTimeout(() => { $('#resetDbBtn').textContent = '⟲ reset-db'; }, 1500);
  if (r.ok) loadTasks();
});

$('#refreshBtn').addEventListener('click', () => { loadTasks(); loadDetail(); });

$('#redeployBtn').addEventListener('click', async () => {
  if (!confirm('현재 worktree 코드 그대로 docker compose up을 다시 실행합니다.\n\n• Phase 1~7 (생성·검증) skip\n• Phase 8 (Deploy)만 실행 — PostTest는 안 함\n• .env의 DEPLOY_MODE=off면 거부됨\n\n계속할까요?')) return;
  $('#redeployBtn').disabled = true;
  $('#redeployBtn').textContent = '🚀 deploying…';
  try {
    const r = await fetchJSON('/api/redeploy', { method: 'POST' });
    if (r.ok) {
      const p = r.ports || {};
      alert(
        `Redeploy 완료 (task_id=${r.task_id})\n\n` +
        `🌐 FE: http://${PUBLIC_HOST}:${p.fe}\n` +
        `🔌 BE: http://${PUBLIC_HOST}:${p.be}\n` +
        `🗄  DB: ${PUBLIC_HOST}:${p.mysql}`
      );
    } else if (r._status === 400) {
      // DEPLOY_MODE=off rejection — surface server message verbatim.
      alert(r.error || 'Redeploy 거부됨 (DEPLOY_MODE=off).');
    } else if (r._status === 409) {
      alert(r.error || '다른 작업 진행 중. 끝난 후 다시 시도하세요.');
    } else {
      alert('Redeploy 실패: ' + (r.error || r._text || 'unknown'));
    }
  } catch (e) {
    alert('Redeploy 호출 실패: ' + e.message);
  } finally {
    $('#redeployBtn').disabled = false;
    $('#redeployBtn').textContent = '🚀 Redeploy';
    loadTasks();
  }
});

$('#rollbackBtn').addEventListener('click', async () => {
  $('#rollbackBtn').disabled = true;
  $('#rollbackBtn').textContent = '⏮ checking…';
  try {
    const p = await fetchJSON('/api/rollback-preview');
    const ahead = p.ahead_commits || [];
    const dirty = p.dirty_files || [];
    if (!p.can_rollback) {
      alert('롤백할 변경사항 없음 — 이미 origin/main 상태입니다.');
      return;
    }
    const msg =
      '⚠ origin/main 상태로 되돌립니다. 작업 손실 위험이 있습니다.\n\n' +
      `로컬 commit ${ahead.length}개가 사라짐:\n` +
      (ahead.slice(0, 8).map((c) => '  • ' + c).join('\n') || '  (없음)') +
      (ahead.length > 8 ? `\n  ... 외 ${ahead.length - 8}개` : '') +
      `\n\n작업 트리에서 정리될 파일 ${dirty.length}개:\n` +
      (dirty.slice(0, 8).map((f) => '  • ' + f).join('\n') || '  (없음)') +
      (dirty.length > 8 ? `\n  ... 외 ${dirty.length - 8}개` : '') +
      (p.env_will_reset
        ? '\n\n.env는 .env.example로 reset되고, 현재 .env는 .env.backup으로 백업됩니다 (기존 .env.backup 덮어씀).\nANTHROPIC_API_KEY와 DB_PASSWORD를 다시 입력해야 합니다.'
        : '\n\n.env.example이 없어 .env는 그대로 유지됩니다.') +
      '\n\n정말 진행할까요?';
    if (!confirm(msg)) return;
    $('#rollbackBtn').textContent = '⏮ resetting…';
    const r = await fetchJSON('/api/rollback', { method: 'POST' });
    if (r.ok) {
      alert(`Rollback 완료 — ${r.reset_to}.\n\n${r.notice || ''}`);
      // Reload everything since .env / BE / FE / tasks all may have changed.
      await Promise.all([loadEnv(), loadTasks()]);
      loadDetail();
    } else {
      alert('Rollback 실패: ' + (r.error || r._text || 'unknown'));
    }
  } catch (e) {
    alert('Rollback 호출 실패: ' + e.message);
  } finally {
    $('#rollbackBtn').disabled = false;
    $('#rollbackBtn').textContent = '⏮ Reset to origin/main';
  }
});

(async function main() {
  await Promise.all([loadEnv(), loadTasks()]);
  setInterval(() => { loadTasks(); loadDetail(); pollRunStatus(); }, 1500);
  pollRunStatus();
})();
</script>
</body>
</html>
