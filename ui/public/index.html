<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Server injects .env PUBLIC_HOST here at request time. The literal
       __PUBLIC_HOST__ is the placeholder served from disk (only visible if
       someone reads the file directly); the actual response substitutes it. -->
  <meta name="public-host" content="__PUBLIC_HOST__" />
  <title>myFirstAgentApp вҖ” control panel</title>
  <style>
    :root {
      --bg: #0f1116;
      --panel: #181b22;
      --panel-2: #1f232c;
      --text: #e2e6ee;
      --muted: #8089a0;
      --accent: #6ea8ff;
      --pass: #4ade80;
      --fail: #ef4444;
      --warn: #fbbf24;
      --border: #2a2f3a;

      /* Area chip colours (label-level identification) */
      --area-orchestrator: #6b7280;
      --area-codechecker:  #a78bfa;
      --area-be:           #4ade80;
      --area-fe:           #6ea8ff;
      --area-lint:         #fbbf24;
      --area-deploy:       #38bdf8;
      --area-posttest:     #f472b6;

      /* Severity colours (box-level вҖ” error/warn/info/ok) */
      --sev-error-fg: #ef4444;
      --sev-error-bg: rgba(239, 68, 68, 0.10);
      --sev-warn-fg:  #fb923c;
      --sev-warn-bg:  rgba(251, 146, 60, 0.10);
      --sev-info-fg:  #fbbf24;
      --sev-info-bg:  rgba(251, 191, 36, 0.09);
      --sev-ok-fg:    #4ade80;
      --sev-ok-bg:    rgba(74, 222, 128, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { margin: 0; font-size: 16px; font-weight: 600; }
    header .muted { color: var(--muted); font-size: 12px; }
    .grid {
      display: grid;
      grid-template-columns: 460px 1fr;
      gap: 16px;
      padding: 16px;
    }
    @media (max-width: 1000px) { .grid { grid-template-columns: 1fr; } }
    section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }
    section h2 {
      margin: 0 0 10px 0;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    label { display: block; margin: 6px 0; font-size: 12px; color: var(--muted); }
    input[type="text"], textarea, select {
      width: 100%;
      padding: 7px 9px;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font: inherit;
    }
    textarea { resize: vertical; min-height: 80px; }
    button {
      padding: 7px 12px;
      background: var(--accent);
      color: #0a0d14;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .row { display: flex; gap: 8px; align-items: center; }
    .row > * { flex: 1; }
    .row > button { flex: 0; }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
    }
    .pill.PASS, .pill.SUCCESS { background: var(--pass); color: #0a0d14; }
    .pill.FAIL, .pill.FAILED { background: var(--fail); color: #fff; }
    .pill.ERROR { background: var(--fail); color: #fff; }
    .pill.IN_PROGRESS, .pill.RUNNING, .pill.PENDING { background: var(--warn); color: #0a0d14; }
    pre {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      overflow-x: auto;
      font-size: 12px;
      max-height: 360px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; }
    tr.clickable { cursor: pointer; }
    tr.clickable:hover { background: var(--panel-2); }
    /* (C) Task table verdict-based row highlight вҖ” н•ңлҲҲм—җ ERROR/FAIL/PASS кө¬л¶„ */
    tr.verdict-ERROR td:first-child,
    tr.verdict-FAIL  td:first-child,
    tr.verdict-FAILED td:first-child { box-shadow: inset 3px 0 0 var(--fail); }
    tr.verdict-PASS  td:first-child,
    tr.verdict-SUCCESS td:first-child { box-shadow: inset 3px 0 0 var(--pass); }
    tr.verdict-IN_PROGRESS td:first-child,
    tr.verdict-RUNNING td:first-child { box-shadow: inset 3px 0 0 var(--warn); }

    /* (B) Final-result banner вҖ” Detail panel мөңмғҒлӢЁ, н•ң нҷ”л©ҙ м•Ҳм—җ мҰүмӢң ліҙмқҙлҸ„лЎқ нҒјм§Ғн•ҳкІҢ */
    .final-card {
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 8px;
      border-left: 6px solid var(--muted);
      background: var(--panel-2);
    }
    .final-card.v-ERROR, .final-card.v-FAIL, .final-card.v-FAILED {
      border-left-color: var(--fail);
      background: var(--sev-error-bg);
    }
    .final-card.v-PASS, .final-card.v-SUCCESS {
      border-left-color: var(--pass);
      background: var(--sev-ok-bg);
    }
    .final-card.v-IN_PROGRESS, .final-card.v-RUNNING {
      border-left-color: var(--warn);
      background: var(--sev-warn-bg);
    }
    .final-card .final-head {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 6px;
    }
    .final-card .final-title {
      font-size: 14px; font-weight: 600; color: var(--text);
    }
    .final-card .final-msg {
      font-family: ui-monospace, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      margin-top: 4px;
    }
    .final-card .final-meta {
      font-size: 11px; color: var(--muted); margin-top: 6px;
    }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .status { font-size: 12px; color: var(--muted); }
    .timeline { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
    .phase {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
    }
    .phase .label { flex: 1; }
    .phase .ts { color: var(--muted); font-size: 11px; }

    /* в”Җв”Җв”Җв”Җв”Җ Area chip вҖ” colours the agent name with its area colour в”Җв”Җв”Җв”Җв”Җ */
    .area-chip {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #0a0d14;
      flex: 0 0 auto;
    }
    .area-chip.orchestrator { background: var(--area-orchestrator); color: #fff; }
    .area-chip.codechecker  { background: var(--area-codechecker); color: #fff; }
    .area-chip.be           { background: var(--area-be); }
    .area-chip.fe           { background: var(--area-fe); }
    .area-chip.lint         { background: var(--area-lint); }
    .area-chip.deploy       { background: var(--area-deploy); }
    .area-chip.posttest     { background: var(--area-posttest); }

    /* в”Җв”Җв”Җв”Җв”Җ Error / warning card (severity-coloured box) в”Җв”Җв”Җв”Җв”Җ */
    .err-card {
      margin: 10px 0;
      border: 1px solid var(--border);
      border-left: 4px solid var(--border);
      border-radius: 6px;
      background: var(--panel-2);
      padding: 12px 14px;
    }
    .err-card.sev-error { border-left-color: var(--sev-error-fg); background: var(--sev-error-bg); }
    .err-card.sev-warn  { border-left-color: var(--sev-warn-fg);  background: var(--sev-warn-bg); }
    .err-card.sev-info  { border-left-color: var(--sev-info-fg);  background: var(--sev-info-bg); }
    .err-card.sev-ok    { border-left-color: var(--sev-ok-fg);    background: var(--sev-ok-bg); }

    .err-card .err-head {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 6px;
      font-size: 13px; font-weight: 600;
    }
    .err-card .err-title { flex: 1; }
    .err-card .err-body { font-size: 12px; color: var(--text); }
    .err-card .err-body p { margin: 4px 0; }
    .err-card .err-body code,
    .err-card .err-body kbd {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      background: var(--panel);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 11px;
    }
    .err-card .err-reco {
      margin-top: 8px;
      padding: 6px 10px;
      background: rgba(255,255,255,0.04);
      border-left: 2px solid var(--muted);
      border-radius: 3px;
      font-size: 12px;
      color: var(--muted);
    }
    .err-card .err-reco b { color: var(--text); }

    /* в”Җв”Җв”Җв”Җв”Җ Expandable / collapsible disclosure в”Җв”Җв”Җв”Җв”Җ */
    details.disclosure {
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--panel-2);
    }
    details.disclosure > summary {
      cursor: pointer;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--muted);
      user-select: none;
    }
    details.disclosure[open] > summary { color: var(--text); border-bottom: 1px solid var(--border); }
    details.disclosure > .disclosure-body { padding: 8px 10px; }

    /* в”Җв”Җв”Җв”Җв”Җ Monospace code block for logs / stack traces в”Җв”Җв”Җв”Җв”Җ */
    .code-block {
      background: #0a0d14;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      line-height: 1.5;
      max-height: 320px;
      overflow: auto;
      white-space: pre;
      color: #c8d2e0;
    }
    .code-block.wrap { white-space: pre-wrap; word-break: break-word; }
    .code-block .dim { color: var(--muted); }

    /* в”Җв”Җв”Җв”Җв”Җ Run row v2 (timeline) в”Җв”Җв”Җв”Җв”Җ */
    .run-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-left-width: 3px;
      border-radius: 6px;
      font-size: 12px;
    }
    .run-row.sev-error { border-left-color: var(--sev-error-fg); }
    .run-row.sev-warn  { border-left-color: var(--sev-warn-fg); }
    .run-row.sev-info  { border-left-color: var(--sev-info-fg); }
    .run-row.sev-ok    { border-left-color: var(--sev-ok-fg); }
    .run-row .name { font-weight: 600; }
    .run-row .target { color: var(--muted); font-size: 11px; }
    .run-row .ts { color: var(--muted); font-size: 11px; margin-left: auto; }

    .timeline { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }

    /* в”Җв”Җв”Җв”Җв”Җ Tiny meta-row chips for silent warnings on SUCCESS runs в”Җв”Җв”Җв”Җв”Җ */
    .meta-chip {
      display: inline-block;
      margin: 2px 4px 2px 0;
      padding: 2px 7px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 3px;
      font-size: 11px;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .meta-chip.warn { color: var(--sev-warn-fg); border-color: var(--sev-warn-fg); }
  </style>
</head>
<body>
  <header>
    <h1>myFirstAgentApp</h1>
    <span class="muted">control panel (Phase 1~9 мӢңк°Ғнҷ” В· .env GUI editor В· лӢЁмқј мӢӨн–ү нҒҗ)</span>
  </header>

  <div class="grid">
    <section>
      <h2>мғҲ мӢӨн–ү</h2>
      <label for="prompt">user_request (л№„мҡ°л©ҙ кё°ліё мӢңлӮҳлҰ¬мҳӨ)</label>
      <textarea id="prompt" placeholder="м—¬кё°м—җ мһ‘м—… мҡ”мІӯмқ„ мһ…л Ҙн•ҳм„ёмҡ”"></textarea>
      <div class="toolbar" style="margin-top: 8px;">
        <button id="runBtn">в–¶ Run pipeline</button>
        <button id="redeployBtn" class="secondary" title="нҳ„мһ¬ worktree мҪ”л“ң к·ёлҢҖлЎң docker compose up (PostTest м•Ҳ н•Ё)">рҹҡҖ Redeploy</button>
        <button id="resetDbBtn" class="secondary">вҹІ reset-db</button>
        <button id="initBtn" class="secondary" style="border-color: var(--warn); color: var(--warn);" title="BE/src + FE/src мӮӯм ң + DB м „мІҙ truncate вҖ” мғҲ cycle м§Ғм „ мғҒнғңлЎң мҙҲкё°нҷ”">рҹ§№ Init project</button>
        <button id="restartUiBtn" class="secondary" title="UI м„ңлІ„ process мһ¬к°ҖлҸҷ вҖ” лҸ„кө¬ мҪ”л“ң(ui/routes, agents, lib) ліҖкІҪ мӢң мӮ¬мҡ©">рҹ”„ Restart UI</button>
        <button id="rollbackBtn" class="secondary" style="border-color: var(--fail); color: var(--fail);" title="git reset --hard origin/main + git clean + .env reset">вҸ® Reset to origin/main</button>
        <!-- мҙҲкё° disabled: pollMergeStatusк°Җ мІ« мқ‘лӢөмқ„ л°ӣкё° м „м—” нҒҙлҰӯ мһҗмІҙлҘј м°ЁлӢЁ.
             ahead commitмқҙ мғқкІЁм•јл§Ң нҷңм„ұнҷ”лҗҳкі , л№„нҷңм„ұ мӮ¬мң лҠ” title мҶҚм„ұм—җм„ң hoverлЎң л…ём¶ң. -->
        <button id="mergeBtn" class="secondary" disabled style="border-color: var(--accent); color: var(--accent);" title="merge к°ҖлҠҘ м—¬л¶Җ нҷ•мқё мӨ‘...">рҹ”Җ Merge to main</button>
      </div>
      <div class="status" id="runStatus">idle</div>

      <h2 style="margin-top: 18px;">.env нҶ кёҖ</h2>
      <div id="envEditor"></div>
    </section>

    <section>
      <h2>мөңк·ј task (нҒҙлҰӯн•ҳл©ҙ мғҒм„ё)</h2>
      <table id="taskTable">
        <thead><tr><th>id</th><th>task_id</th><th>verdict</th><th>updated_at</th></tr></thead>
        <tbody></tbody>
      </table>

      <h2 style="margin-top: 18px;">мғҒм„ё вҖ” <span id="detailTaskId" class="muted">(м„ нғқ м•Ҳ лҗЁ)</span></h2>
      <div id="detail"></div>
    </section>
  </div>

<script>
const $ = (sel) => document.querySelector(sel);
const fmtTime = (ts) => ts ? new Date(ts).toLocaleString() : '';
const pill = (val) => val ? `<span class="pill ${val}">${val}</span>` : '';

let selectedTaskId = null;

// (D-fix) Detail panel re-render л°©м§Җмҡ© мәҗмӢң.
//   - lastDetailHash: м§Ғм „м—җ к·ёлҰ° мқ‘лӢөмқҳ fingerprint. 1.5s pollingм—җм„ң dataк°Җ
//     м•Ҳ л°”лҖҢл©ҙ innerHTMLмқ„ лӢӨмӢң м•Ҳ м“ҙлӢӨ вҶ’ мӮ¬мҡ©мһҗк°Җ нҺјм№ң <details>к°Җ м•Ҳ лӢ«нһҳ.
//   - lastDetailTerminal: verdictк°Җ PASS/FAIL/ERRORлЎң нҷ•м •лҗҳл©ҙ лҚ” fetchлҸ„ м•Ҳ н•Ё
//     (к°’мқҙ ліҖн•  мқј м—ҶмқҢ). selectTask()лҠ” мқҙ л‘ҳмқ„ resetн•ҙ к°•м ң re-render.
let lastDetailHash = '';
let lastDetailTerminal = false;

// Browser host for FE/BE service links. Initial value comes from the
// <meta name="public-host"> that ui/server.js injects per request (from
// .env PUBLIC_HOST). loadEnv() refreshes it on every poll so a UI toggle
// propagates without a page reload. The meta fallback "__PUBLIC_HOST__"
// is what you'd see only if the file is opened from disk (i.e. not via
// the UI server) вҖ” treat that as "host unknown, do not link out".
let PUBLIC_HOST =
  document.querySelector('meta[name="public-host"]')?.content || '';
if (PUBLIC_HOST === '__PUBLIC_HOST__') PUBLIC_HOST = '';

async function fetchJSON(url, opts) {
  const r = await fetch(url, opts);
  const ct = r.headers.get('content-type') || '';
  if (!ct.includes('json')) {
    return { _status: r.status, _text: await r.text() };
  }
  return r.json();
}

// 3-state toggle keys: each maps an on/off checkbox to two string values.
// Anything else falls back to the text+save row layout below.
const TOGGLE_KEYS = {
  COMMIT_MODE:              { on: 'auto', off: 'manual' },
  VALIDATION_MODE:          { on: 'on',   off: 'off' },
  DEPLOY_MODE:              { on: 'on',   off: 'off' },
  DEPLOY_TEARDOWN_ON_PASS:  { on: 'on',   off: 'off' },
};

async function putEnv(key, value) {
  return fetchJSON('/api/env', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ [key]: value }),
  });
}

async function loadEnv() {
  const data = await fetchJSON('/api/env');
  // Refresh PUBLIC_HOST so subsequent FE/BE links pick up any UI edit
  // (or .env reset) without requiring a page reload.
  if (data.editable && data.editable.PUBLIC_HOST) {
    PUBLIC_HOST = data.editable.PUBLIC_HOST;
  }
  const root = $('#envEditor');
  root.innerHTML = '';

  // Toggle row at the top вҖ” checked = "on value", unchecked = "off value".
  // change event writes to .env immediately.
  for (const k of data.editableKeys) {
    if (!TOGGLE_KEYS[k]) continue;
    const t = TOGGLE_KEYS[k];
    const val = data.editable[k] ?? '';
    const checked = val === t.on;
    const wrap = document.createElement('div');
    wrap.className = 'row';
    wrap.style.marginBottom = '4px';
    wrap.innerHTML =
      `<label style="flex:0 0 200px; margin:0; font-family: ui-monospace, monospace;">${k}</label>` +
      `<label style="flex:1; display:flex; align-items:center; gap:8px; margin:0;">` +
        `<input type="checkbox" data-toggle="${k}" ${checked ? 'checked' : ''} />` +
        `<span data-toggle-value="${k}" style="font-family: ui-monospace, monospace; color: var(--muted); font-size: 12px;">${checked ? t.on : t.off}</span>` +
      `</label>` +
      `<span data-toggle-status="${k}" class="status" style="flex:0 0 60px; text-align:right;"></span>`;
    root.appendChild(wrap);
  }

  // The remaining keys (models, ports, retries, ...) keep the text+save layout.
  for (const k of data.editableKeys) {
    if (TOGGLE_KEYS[k]) continue;
    const val = data.editable[k] ?? '';
    const wrap = document.createElement('div');
    wrap.className = 'row';
    wrap.style.marginBottom = '4px';
    wrap.innerHTML =
      `<label style="flex:0 0 200px; margin:0; font-family: ui-monospace, monospace;">${k}</label>` +
      `<input type="text" data-key="${k}" value="${val.replace(/"/g, '&quot;')}" />` +
      `<button class="secondary" data-save="${k}">save</button>`;
    root.appendChild(wrap);
  }

  // Wire toggle change вҶ’ immediate PUT.
  root.querySelectorAll('input[data-toggle]').forEach((cb) => {
    cb.addEventListener('change', async () => {
      const key = cb.getAttribute('data-toggle');
      const t = TOGGLE_KEYS[key];
      const value = cb.checked ? t.on : t.off;
      const valueEl = root.querySelector(`[data-toggle-value="${key}"]`);
      const statusEl = root.querySelector(`[data-toggle-status="${key}"]`);
      cb.disabled = true;
      statusEl.textContent = 'savingвҖҰ';
      try {
        const res = await putEnv(key, value);
        if (res.ok) {
          valueEl.textContent = value;
          statusEl.textContent = 'вң“ saved';
        } else {
          // Revert checkbox state on failure.
          cb.checked = !cb.checked;
          statusEl.textContent = 'вң— fail';
        }
      } catch (_) {
        cb.checked = !cb.checked;
        statusEl.textContent = 'вң— fail';
      } finally {
        cb.disabled = false;
        setTimeout(() => { statusEl.textContent = ''; }, 1500);
      }
    });
  });

  // Wire text+save buttons (unchanged behavior).
  root.querySelectorAll('button[data-save]').forEach((btn) => {
    btn.addEventListener('click', async () => {
      const key = btn.getAttribute('data-save');
      const input = root.querySelector(`input[data-key="${key}"]`);
      const value = input.value;
      btn.disabled = true;
      try {
        const res = await putEnv(key, value);
        if (res.ok) {
          btn.textContent = 'saved';
          setTimeout(() => { btn.textContent = 'save'; btn.disabled = false; }, 1200);
        } else {
          btn.textContent = 'fail';
          setTimeout(() => { btn.textContent = 'save'; btn.disabled = false; }, 1500);
        }
      } catch (_) { btn.disabled = false; }
    });
  });
}

async function loadTasks() {
  const data = await fetchJSON('/api/tasks');
  const tbody = $('#taskTable tbody');
  tbody.innerHTML = '';
  for (const t of (data.tasks || [])) {
    const tr = document.createElement('tr');
    // (C) verdict classлҘј м¶”к°Җн•ҙ CSSмқҳ мўҢмёЎ ліҖ к°•мЎ°к°Җ ERROR/PASS rowм—җ мһҗлҸҷ м Ғмҡ©.
    tr.className = `clickable${t.final_verdict ? ' verdict-' + t.final_verdict : ''}`;
    if (selectedTaskId && t.task_id === selectedTaskId) tr.classList.add('selected');
    tr.innerHTML =
      `<td>${t.id}</td>` +
      `<td style="font-family: ui-monospace, monospace; font-size: 11px;">${t.task_id}</td>` +
      `<td>${pill(t.final_verdict)}</td>` +
      `<td class="muted">${fmtTime(t.updated_at)}</td>`;
    tr.addEventListener('click', () => selectTask(t.task_id));
    tbody.appendChild(tr);
  }
}

function selectTask(task_id) {
  if (selectedTaskId === task_id) return; // already selected вҖ” don't kick off a re-render
  selectedTaskId = task_id;
  $('#detailTaskId').textContent = task_id;
  // мғҲ task м„ нғқ мӢңм—” к°•м ңлЎң re-render (мқҙм „ taskмқҳ hash/terminal мәҗмӢң л¬ҙнҡЁнҷ”).
  lastDetailHash = '';
  lastDetailTerminal = false;
  loadDetail();
}

// в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ Detail panel helpers в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function safeJson(v) {
  if (v == null) return null;
  if (typeof v === 'object') return v;
  try { return JSON.parse(v); } catch (_) { return null; }
}

/** Area chip class for a (agent_name, target) pair. */
function areaClass(agent, target) {
  const a = String(agent || '').toLowerCase();
  if (a === 'be' || (a === 'lint' && target === 'BE')) return a === 'lint' ? 'lint' : 'be';
  if (a === 'fe' || (a === 'lint' && target === 'FE')) return a === 'lint' ? 'lint' : 'fe';
  if (a === 'orchestrator') return 'orchestrator';
  if (a === 'codechecker')  return 'codechecker';
  if (a === 'deploy')       return 'deploy';
  if (a === 'posttest')     return 'posttest';
  return 'orchestrator';
}

/** Extract the first meaningful line matching `regex` from a multiline blob. */
function extractKeyLine(text, regex, maxLen = 300) {
  const line = String(text || '')
    .split('\n')
    .map((l) => l.trim())
    .find((l) => l && regex.test(l));
  return line ? line.slice(0, maxLen) : '';
}

/** Find the most relevant FAILED run for top-level surfacing.
 *  Orchestrator row is a task-level wrap with no detail вҖ” prefer the actual
 *  phase agent that failed (Deploy / PostTest / Lint / BE / FE / CodeChecker).
 *  Falls back to Orchestrator only if no phase agent failed.
 */
function pickFailedRun(runs) {
  if (!runs || runs.length === 0) return null;
  const failed = runs.filter((r) => r.status === 'FAILED');
  if (failed.length === 0) return null;
  // Prefer non-Orchestrator agent rows (they hold the real cause).
  const phaseFail = failed.find((r) => r.agent_name !== 'Orchestrator');
  return phaseFail || failed[0];
}

/** Classify a FAILED log_agent_runs row вҶ’ severity / category / label / recommendation. */
function classifyRunError(run) {
  const oj = safeJson(run.output_json) || {};
  const err = String(oj.error || '');
  const stack = String(oj.stack || '');
  const agent = String(run.agent_name || '');

  // ===== Deploy (Phase 8) нҠ№мҲҳ мІҳлҰ¬ =====
  // output_json кө¬мЎ°: { failed_stage, error?, compose_output?, logs?: {be,fe}, exit_code, duration_ms }
  if (agent === 'Deploy') {
    const cOut = String(oj.compose_output || '');
    const logs = oj.logs || {};
    const logsBe = String(logs.be || '');
    const logsFe = String(logs.fe || '');
    const allDeploy = err + '\n' + cOut + '\n' + logsBe + '\n' + logsFe;
    const fs = String(oj.failed_stage || '');

    // Docker daemon лӢӨмҡҙ (Windows: npipe, Linux: socket) вҖ” к°ҖмһҘ нқ”н•ң нҷҳкІҪ м—җлҹ¬
    if (/dockerDesktopLinuxEngine|docker daemon|Cannot connect to the Docker daemon|npipe:\/\/|\/var\/run\/docker\.sock/i.test(allDeploy)) {
      return {
        severity: 'error',
        category: 'DOCKER_DAEMON_DOWN',
        label: 'рҹҗі Docker Desktop лҜёмӢӨн–ү (лҚ°лӘ¬ м—°кІ° мӢӨнҢЁ)',
        detail: extractKeyLine(allDeploy, /docker|daemon|pipe|sock/i) || 'docker daemonм—җ м—°кІ° мӢӨнҢЁ',
        recommendation: 'Docker Desktopмқ„ мӢңмһ‘н•ҳм„ёмҡ” (мһ¬л¶ҖнҢ… нӣ„ мһҗлҸҷ мӢңмһ‘ м•Ҳ лҗҗмқ„ к°ҖлҠҘм„ұ). мӢңмһ‘ нӣ„ `docker info`мқҳ Server м„№м…ҳмқҙ лӮҳмҳӨл©ҙ UIмқҳ Redeploy лІ„нҠјмңјлЎң мһ¬мӢңлҸ„. лҳҗлҠ” .envмқҳ DEPLOY_MODE=offлЎң Phase 8/9 skip.',
      };
    }

    if (fs === 'docker_check') {
      return {
        severity: 'error',
        category: 'DOCKER_CHECK_FAILED',
        label: 'рҹҗі Docker CLI/Compose мӮ¬м „ м җкІҖ мӢӨнҢЁ',
        detail: err || 'docker лӘ…л № мһҗмІҙлҘј мӮ¬мҡ©н•  мҲҳ м—ҶмқҢ',
        recommendation: 'Docker Desktop м„Өм№ҳ + PATH нҷ•мқё. лҳҗлҠ” .envмқҳ DEPLOY_MODE=offлЎң Phase 8/9 skip.',
      };
    }
    if (fs === 'host_mysql_ping') {
      return {
        severity: 'error',
        category: 'HOST_MYSQL_DOWN',
        label: 'рҹ—„ host MySQL м—°кІ° мӢӨнҢЁ',
        detail: err || 'host MySQL ping мӢӨнҢЁ',
        recommendation: 'host MySQL м„ңл№„мҠӨ мӢӨн–ү нҷ•мқё + .envмқҳ DB_HOST/PORT/USER/PASSWORD кІҖнҶ . м»Ён…Ңмқҙл„ҲлҠ” host.docker.internalлЎң host MySQLм—җ м ‘к·ј.',
      };
    }
    if (fs === 'port_preflight') {
      const rp = oj.requested_ports || {};
      return {
        severity: 'error',
        category: 'PORT_CONFLICT',
        label: 'рҹ”Ң нҸ¬нҠё м¶©лҸҢ (preflight fallback н•ңкі„ мҙҲкіј)',
        detail: err || `мҡ”мІӯ нҸ¬нҠё: be=${rp.be || '?'} fe=${rp.fe || '?'}`,
        recommendation: '.envмқҳ BE_PORT/FE_PORT ліҖкІҪ лҳҗлҠ” м җмң  process мў…лЈҢ (`netstat -ano | findstr :PORT`).',
      };
    }
    if (fs === 'compose_up_timeout') {
      return {
        severity: 'error',
        category: 'COMPOSE_TIMEOUT',
        label: `вҸұ compose up timeout (${oj.duration_ms || '?'}ms)`,
        detail: err || 'docker compose upмқҙ timeout м•Ҳм—җ healthy м•Ҳ лҗЁ',
        recommendation: 'мқҙлҜём§Җ л№Ңл“ң мӢңк°„ лҳҗлҠ” healthcheck м§Җм—°мқҙ мӣҗмқё. DEPLOY_TIMEOUT_MS лҠҳлҰ¬кұ°лӮҳ Dockerfile мәҗмӢң нҷ•мқё. logs.be/logs.fe нҺјміҗ м»Ён…Ңмқҙл„Ҳ л§Ҳм§Җл§ү м¶ңл Ҙ нҷ•мқё.',
      };
    }
    if (fs === 'compose_up') {
      const firstLine = extractKeyLine(cOut + '\n' + logsBe + '\n' + logsFe, /error|fail|cannot|denied|refused/i)
        || (cOut || logsBe || logsFe || '').split('\n').filter((l) => l.trim())[0] || '';
      return {
        severity: 'error',
        category: 'COMPOSE_UP_FAILED',
        label: `рҹҗі docker compose up мӢӨнҢЁ (exit ${oj.exit_code ?? '?'})`,
        detail: firstLine.slice(0, 300) || err || 'compose up мӢӨнҢЁ',
        recommendation: 'output_jsonмқҳ compose_output лҳҗлҠ” logs.{be,fe}лҘј нҺјміҗ мӣҗліё м—җлҹ¬ нҷ•мқё. нқ”н•ң мӣҗмқё: л№Ңл“ң мӢӨнҢЁ / нҸ¬нҠё м җмң  / mysql healthcheck мӢӨнҢЁ / мқҳмЎҙм„ұ м„Өм№ҳ мӢӨнҢЁ.',
      };
    }
    // generic Deploy fail
    return {
      severity: 'error',
      category: 'DEPLOY_FAILED',
      label: 'рҹҗі Deploy мӢӨнҢЁ' + (fs ? ` (${fs})` : ''),
      detail: err || cOut.slice(0, 200) || '(no error message)',
      recommendation: 'output_json м „мІҙ нҺјміҗ failed_stageВ·compose_outputВ·logs нҷ•мқё.',
    };
  }

  // ===== PostTest (Phase 9) нҠ№мҲҳ мІҳлҰ¬ =====
  // мјҖмқҙмҠӨ 1 (exception): { pass:false, error, baseUrl }
  // мјҖмқҙмҠӨ 2 (endpoint fail): { pass:false, total, passed, results:[per-endpoint] }
  if (agent === 'PostTest') {
    const results = Array.isArray(oj.results) ? oj.results : [];
    // мјҖмқҙмҠӨ 1: мҳҲмҷё (results м—ҶмқҢ, errorл§Ң)
    if (!results.length && err) {
      return {
        severity: 'error',
        category: 'POSTTEST_EXCEPTION',
        label: 'рҹ§Ә PostTest мӢӨн–ү мҳҲмҷё',
        detail: err,
        recommendation: `BE м»Ён…Ңмқҙл„Ҳк°Җ м •мғҒ мқ‘лӢөн•ҳлҠ”м§Җ нҷ•мқё (baseUrl: ${oj.baseUrl || '?'}). curlлЎң м§Ғм ‘ мӢңлҸ„ к°ҖлҠҘ. м»Ён…Ңмқҙл„Ҳ healthcheck лҳҗлҠ” BE мӢңмһ‘ мӢӨнҢЁ мқҳмӢ¬.`,
      };
    }
    // мјҖмқҙмҠӨ 2: endpoint assertion мӢӨнҢЁ
    const failedEps = results.filter((r) => !r.pass);
    if (failedEps.length > 0) {
      const first = failedEps[0] || {};
      const firstErr = (Array.isArray(first.errors) && first.errors[0])
        || first.reason
        || first.error
        || 'schema mismatch';
      const epName = first.name || first.path || `${first.method || ''} ${first.path || ''}`.trim() || 'endpoint';
      return {
        severity: 'error',
        category: 'POSTTEST_ASSERTION_FAIL',
        label: `рҹ§Ә PostTest мӢӨнҢЁ (${oj.passed ?? 0}/${oj.total ?? failedEps.length} endpoints)`,
        detail: `[${epName}] ${firstErr}`.slice(0, 300),
        recommendation: 'output_json.resultsлҘј нҺјміҗ к°Ғ endpointлі„ trace/errors нҷ•мқё. нқ”н•ң мӣҗмқё: BE мқ‘лӢө нҳ•мӢқмқҙ api_contractмҷҖ л¶Ҳмқјм№ҳ / status мҪ”л“ң mismatch / н•„л“ңлӘ…В·нғҖмһ… м°Ёмқҙ.',
      };
    }
    return {
      severity: 'error',
      category: 'POSTTEST_FAILED',
      label: 'рҹ§Ә PostTest мӢӨнҢЁ',
      detail: err || '(no detail)',
      recommendation: 'output_json м „мІҙ нҺјміҗм„ң нҷ•мқё.',
    };
  }

  // ===== кё°мЎҙ LLM Agent лҘҳ л¶„лҘҳ =====
  const all = err + '\n' + stack;

  // UNAUTHORIZED_DEPS вҖ” validateAllowedDeps throw
  if (/UNAUTHORIZED_DEPS/i.test(all) || /Unauthorized dependencies/i.test(err)) {
    const m = err.match(/Unauthorized dependencies detected:\s*([^.]+)\./i);
    return {
      severity: 'error',
      category: 'UNAUTHORIZED_DEPS',
      label: 'рҹҡ« лҜён—Ҳк°Җ мқҳмЎҙм„ұ (allowedDeps мң„л°ҳ)',
      detail: m ? m[1].trim() : err,
      recommendation: 'rules/*.mdм—җ к·ё нҢЁнӮӨм§Җ лӘ…мӢң кёҲм§Җ м¶”к°Җн•ҳкұ°лӮҳ, м •л§җ н•„мҡ”н•ҳл©ҙ lib/stack.config.jsonмқҳ allowedDeps нҷ•мһҘ. ліҙнҶөмқҖ promptлҘј лҚ” лӘ…нҷ•нһҲ вҖ” bcrypt vs bcryptjs к°ҷмқҖ н•Ём •мқҖ rulesм—җ NOT н‘ңкё° м¶”к°Җ.',
    };
  }
  // validatePaths throw вҖ” protected file or outside BE/FE
  if (/protected stack config file/i.test(all) || /Disallowed path/i.test(all) || /not in allowed_paths/i.test(all)) {
    return {
      severity: 'error',
      category: 'PROTECTED_PATH',
      label: 'рҹӣЎ Protected нҢҢмқј / мҳҒм—ӯ м№ЁлІ”',
      detail: err,
      recommendation: 'LLMмқҙ package.jsonВ·vite.configВ·.eslintrc к°ҷмқҖ ліҙнҳё нҢҢмқјм—җ м“°л Ө н•Ё. rules/common.md В§9 ліҙнҳё нҢҢмқј н•ӯлӘ© к°•мЎ° лҳҗлҠ” lib/stack.config.json protectedConfigFiles м җкІҖ.',
    };
  }
  // LLM_TRUNCATED вҖ” callJSON throws this
  if (/LLM_TRUNCATED/i.test(all) || /TRUNCATED after/i.test(err)) {
    return {
      severity: 'warn',
      category: 'LLM_TRUNCATED',
      label: 'вңӮпёҸ LLM мқ‘лӢө мһҳлҰј (max_tokens мҙҲкіј)',
      detail: err,
      recommendation: 'agentлі„ max_tokens мҰқк°Җ лҳҗлҠ” prompt лӢЁм¶•. lib/llm.jsмқҳ Continuation patternмқҙ 3нҡҢ лҲ„м Ғ нӣ„м—җлҸ„ мӢӨнҢЁн•ҳл©ҙ м—¬кё° лҸ„лӢ¬.',
    };
  }
  // JSON parse fail
  if (/did not return valid JSON/i.test(all) || /JSON.*parse/i.test(all)) {
    return {
      severity: 'warn',
      category: 'JSON_PARSE_FAIL',
      label: 'рҹ“қ LLM JSON мқ‘лӢө нҢҢмӢұ мӢӨнҢЁ',
      detail: err,
      recommendation: 'callJSONм—җ retry layer мһҲмқҢ вҖ” к·ёлһҳлҸ„ мӢӨнҢЁл©ҙ raw мқ‘лӢө dump мң„м№ҳ нҷ•мқё (Temp л””л үн„°лҰ¬). promptм—җ escape к°Җмқҙл“ң к°•нҷ” к°ҖлҠҘ.',
    };
  }
  // Docker not installed
  if (/Docker CLI not installed/i.test(all) || /Docker Compose not available/i.test(all)) {
    return {
      severity: 'error',
      category: 'DOCKER_MISSING',
      label: 'рҹҗі Docker лҜём„Өм№ҳ / лҜёмӢӨн–ү',
      detail: err,
      recommendation: 'Docker Desktop м„Өм№ҳ + мӢӨн–ү нҷ•мқё. лҳҗлҠ” .envм—җм„ң DEPLOY_MODE=offлЎң Phase 8/9 skip.',
    };
  }
  // Generic agent exception
  return {
    severity: 'error',
    category: 'AGENT_EXCEPTION',
    label: 'вқҢ Agent мҳҲмҷё',
    detail: err || '(no error message)',
    recommendation: 'output_json.stackмқ„ нҺјміҗ мһҗм„ён•ң нҳём¶ң мң„м№ҳ нҷ•мқё.',
  };
}

/** Deploy/PostTest run's failed_stage вҶ’ label. */
function classifyDeployStage(failedStage) {
  switch (failedStage) {
    case 'docker_check':       return { label: 'рҹҗі Docker лҜём„Өм№ҳ', sev: 'error' };
    case 'port_preflight':     return { label: 'рҹ”Ң Port м¶©лҸҢ (fallback н•ңкі„ мҙҲкіј)', sev: 'error' };
    case 'compose_up':         return { label: 'рҹҗі compose up мӢӨнҢЁ', sev: 'error' };
    case 'compose_up_timeout': return { label: 'вҸұ compose up timeout', sev: 'error' };
    default:                   return { label: failedStage || 'Deploy мӢӨнҢЁ', sev: 'error' };
  }
}

/** Lint failed_stage вҶ’ label. */
function classifyLintStage(failedStage) {
  switch (failedStage) {
    case 'STAGE1': return { label: 'рҹ”§ Lint Stage 1 (eslint) мӢӨнҢЁ', sev: 'info', retryable: true };
    case 'STAGE2': return { label: 'рҹ”§ Lint Stage 2 (build/syntax) мӢӨнҢЁ', sev: 'info', retryable: true };
    case 'STAGE3': return { label: 'рҹ§Ә Lint Stage 3 (tests) мӢӨнҢЁ вҖ” retry м—ҶмқҢ', sev: 'error', retryable: false };
    default:       return { label: failedStage || 'Lint мӢӨнҢЁ', sev: 'warn', retryable: false };
  }
}

/** Render a single error card. */
function renderErrCard(c) {
  const detailHtml = c.detail
    ? `<div class="err-body"><p><code>${esc(c.detail)}</code></p></div>`
    : '';
  const recoHtml = c.recommendation
    ? `<div class="err-reco"><b>к¶ҢмһҘ лҢҖмқ‘:</b> ${esc(c.recommendation)}</div>`
    : '';
  return `
    <div class="err-card sev-${c.severity}">
      <div class="err-head">
        <span class="err-title">${esc(c.label)}</span>
      </div>
      ${detailHtml}
      ${recoHtml}
    </div>`;
}

/** Render a code block disclosure for big text (stdout/stderr/stack). */
function renderCodeDisclosure(summary, text, opts = {}) {
  if (!text || !String(text).trim()) return '';
  const wrapCls = opts.wrap === false ? '' : ' wrap';
  return `
    <details class="disclosure">
      <summary>${esc(summary)}</summary>
      <div class="disclosure-body"><div class="code-block${wrapCls}">${esc(text)}</div></div>
    </details>`;
}

/** Render meta chips for silent warnings on SUCCESS Agent runs. */
function renderMetaChips(oj) {
  const chips = [];
  if (Array.isArray(oj.dropped_protected) && oj.dropped_protected.length) {
    chips.push(`<span class="meta-chip warn" title="LLM мқ‘лӢөм—җ protected file мһҲм—Ҳм§Җл§Ң silent dropлҗЁ">drop_protected: ${oj.dropped_protected.length}</span>`);
  }
  if (Array.isArray(oj.dropped_tests) && oj.dropped_tests.length) {
    chips.push(`<span class="meta-chip" title="LLMмқҙ л§Ңл“  test нҢҢмқјмқҖ мӢңмҠӨн…ңмқҙ кІ°м •лЎ м ҒмңјлЎң мһҗлҸҷ мғқм„ұн•ҳлҜҖлЎң silent dropлҗЁ">drop_tests: ${oj.dropped_tests.length}</span>`);
  }
  if (Array.isArray(oj.auto_generated_tests) && oj.auto_generated_tests.length) {
    chips.push(`<span class="meta-chip" title="lib/test_codegen.jsк°Җ кІ°м •лЎ м ҒмңјлЎң л§Ңл“  smoke test">auto_tests: ${oj.auto_generated_tests.length}</span>`);
  }
  if (oj.eslintrc_created) {
    chips.push(`<span class="meta-chip">eslintrc мғқм„ұ</span>`);
  }
  if (oj.skipped) {
    chips.push(`<span class="meta-chip">skipped: ${esc(oj.skipped)}</span>`);
  }
  if (oj.ports_changed) {
    chips.push(`<span class="meta-chip warn" title="port preflight fallback л°ңмғқ">ports_changed</span>`);
  }
  return chips.length > 0 ? `<div style="margin-top: 4px;">${chips.join(' ')}</div>` : '';
}

/**
 * (B) Render the top-of-panel "мөңмў… кІ°кіј" banner.
 *
 * н•ӯмғҒ н‘ңмӢң (verdict л¬ҙкҙҖ) вҖ” Detail panelмқ„ м—ҙмһҗл§Ҳмһҗ мӮ¬мҡ©мһҗк°Җ н•ңлҲҲм—җ:
 *   - verdict pill
 *   - orchestratorк°Җ кІ°м •н•ң мөңмў… л©”мӢңм§Җ (final_result_text)
 *   - ERROR/FAILмқҙл©ҙ мІ« FAILED runмқҳ м—җлҹ¬ л©”мӢңм§Җ н•ң мӨ„ мҡ”м•Ҫ (drill-down м—Ҷмқҙ)
 *   - м§„н–ү мӨ‘мқҙл©ҙ retry м •ліҙ
 *
 * мқҙм „ кө¬нҳ„мқҖ ERROR/FAILмқј л•Ңл§Ң л¶„лҘҳ м№ҙл“ңлҘј лқ„мӣ кі  final_result_textлҠ”
 * fallbackмқҙлқј л¬»нҳҖм„ң м•Ҳ ліҙмҳҖмқҢ. мқҙм ң л‘ҳ лӢӨ к°ҷмқҖ м№ҙл“ң м•Ҳм—җ л…ём¶ң.
 */
function renderFinalResultCard(decision, states, runs) {
  if (!decision) return '';
  const v = decision.final_verdict || 'IN_PROGRESS';
  const cls = `v-${esc(v)}`;
  const titleMap = {
    PASS:        'вң… PASS вҖ” лӘЁл“  phase нҶөкіј',
    SUCCESS:     'вң… SUCCESS',
    ERROR:       'рҹҡЁ ERROR вҖ” Agent мҳҲмҷёлЎң phase мӨ‘лӢЁ',
    FAIL:        'вқҢ FAIL вҖ” кІҖмҰқ лӢЁкі„м—җм„ң мӢӨнҢЁ',
    FAILED:      'вқҢ FAILED',
    IN_PROGRESS: 'вҸі IN_PROGRESS вҖ” м•„м§Ғ мӢӨн–ү мӨ‘',
    RUNNING:     'вҸі RUNNING',
  };
  const title = titleMap[v] || v;

  // мөңмў… кІ°кіј л©”мӢңм§Җ нӣ„ліҙ: final_result_textк°Җ мҡ°м„ мқҙлҗҳ, к·ёкІҢ generic м•ҲлӮҙл¬ё
  // ("see ... output_json for details")мқҙл©ҙ classified detailлЎң *ліҙк°•*н•ҙм„ң drill-down
  // м—ҶмқҙлҸ„ м§„м§ң мӣҗмқёмқҙ ліҙмқҙлҸ„лЎқ. final_result_text мһҗмІҙк°Җ м—Ҷмңјл©ҙ л¶„лҘҳ кІ°кіјлЎң лҢҖмІҙ.
  let msg = (decision.final_result_text || '').trim();
  const isGenericMsg = /see\s+.*output_json\s+for\s+details/i.test(msg)
    || /see\s+\w+\s+run\s+output_json/i.test(msg);
  if ((!msg || isGenericMsg) && (v === 'ERROR' || v === 'FAIL')) {
    const failedRun = pickFailedRun(runs);
    if (failedRun) {
      const c = classifyRunError(failedRun);
      const tgt = failedRun.target ? ` / ${failedRun.target}` : '';
      const enriched = `[${failedRun.agent_name}${tgt}] ${c.label}\n${c.detail || ''}`.trim();
      msg = isGenericMsg ? `${msg}\n\n${enriched}` : enriched;
    } else {
      const failedState = (states || []).find((s) => s.status === 'FAILED');
      if (failedState) {
        const c = classifyLintStage(failedState.failed_stage);
        const enriched = `[Lint / ${failedState.target}] ${c.label} (retry ${failedState.retry_count})`;
        msg = isGenericMsg ? `${msg}\n\n${enriched}` : enriched;
      }
    }
  }

  const metaBits = [];
  if (decision.updated_at) metaBits.push(`updated_at=${fmtTime(decision.updated_at)}`);
  if (decision.task_id) metaBits.push(`task_id=${esc(decision.task_id)}`);
  const meta = metaBits.length ? `<div class="final-meta">${metaBits.join(' В· ')}</div>` : '';

  return `
    <div class="final-card ${cls}">
      <div class="final-head">
        ${pill(v)}
        <span class="final-title">${esc(title)}</span>
      </div>
      ${msg ? `<div class="final-msg">${esc(msg)}</div>` : ''}
      ${meta}
    </div>`;
}

/** Render the most-critical error summary card on top (Layer 1). */
function renderTopErrorSummary(decision, states, runs) {
  if (!decision) return '';
  if (decision.final_verdict !== 'ERROR' && decision.final_verdict !== 'FAIL') return '';

  // Pick the most informative FAILED run вҖ” OrchestratorлҠ” task-level wrapмқҙлқј
  // detailмқҙ м—ҶмңјлӢҲ мӢӨм ң phase agent(Deploy/PostTest/Lint/BE/FE/CodeChecker)лҘј мҡ°м„ .
  const failedRun = pickFailedRun(runs);
  if (failedRun) {
    const c = classifyRunError(failedRun);
    const area = areaClass(failedRun.agent_name, failedRun.target);
    const tgt = failedRun.target ? ' / ' + failedRun.target : '';
    return `
      <div class="err-card sev-${c.severity}" style="margin-top: 10px;">
        <div class="err-head">
          <span class="area-chip ${area}">${esc(failedRun.agent_name)}${esc(tgt)}</span>
          <span class="err-title">${esc(c.label)}</span>
        </div>
        ${c.detail ? `<div class="err-body"><p><code>${esc(c.detail)}</code></p></div>` : ''}
        ${c.recommendation ? `<div class="err-reco"><b>к¶ҢмһҘ лҢҖмқ‘:</b> ${esc(c.recommendation)}</div>` : ''}
      </div>`;
  }

  // No exception вҶ’ FAIL from Lint stage3 or retry exhaustion. Surface the
  // first FAILED task_state.
  const failedState = (states || []).find((s) => s.status === 'FAILED');
  if (failedState) {
    const c = classifyLintStage(failedState.failed_stage);
    return `
      <div class="err-card sev-${c.sev}" style="margin-top: 10px;">
        <div class="err-head">
          <span class="area-chip lint">Lint / ${esc(failedState.target)}</span>
          <span class="err-title">${esc(c.label)} (retry ${failedState.retry_count})</span>
        </div>
        <div class="err-body"><p>мӢӨнҢЁн•ң мҳҒм—ӯ: <code>${esc(failedState.target)}</code></p></div>
        <div class="err-reco"><b>к¶ҢмһҘ лҢҖмқ‘:</b> ${c.retryable
          ? 'retryлЎң мһҗлҸҷ нҡҢліө мӢңлҸ„ мӨ‘. retry_countк°Җ MAX(3) лҸ„лӢ¬н•ҳл©ҙ verdict=FAIL.'
          : 'Stage 3 (tests) мӢӨнҢЁлҠ” retry м—Ҷмқҙ мҰүмӢң FAIL. л№„мҰҲлӢҲмҠӨ лЎңм§Ғ м җкІҖ н•„мҡ”.'}</div>
      </div>`;
  }

  // Fallback вҖ” generic.
  if (decision.final_result_text) {
    return `
      <div class="err-card sev-error" style="margin-top: 10px;">
        <div class="err-head"><span class="err-title">${esc(decision.final_verdict)}</span></div>
        <div class="err-body"><div class="code-block wrap">${esc(decision.final_result_text)}</div></div>
      </div>`;
  }
  return '';
}

/** Render the run timeline (Layer 2) вҖ” each row coloured by severity + area chip + expand. */
function renderTimeline(runs) {
  if (!runs || runs.length === 0) return '';
  const rows = runs.map((r, idx) => {
    const oj = safeJson(r.output_json) || {};
    const area = areaClass(r.agent_name, r.target);
    const tgt = r.target ? `<span class="target">/ ${esc(r.target)}</span>` : '';
    const sev = r.status === 'FAILED' ? 'sev-error'
              : r.status === 'RUNNING' ? 'sev-info'
              : 'sev-ok';
    const ts = `${fmtTime(r.started_at)} вҶ’ ${r.ended_at ? fmtTime(r.ended_at) : '...'}`;

    let expand = '';
    if (r.status === 'FAILED') {
      // Exception path вҖ” render full error card + stack disclosure
      const c = classifyRunError(r);
      expand += renderErrCard(c);
      if (oj.stack) expand += renderCodeDisclosure('в–ј stack trace', oj.stack, { wrap: true });

      // Deploy-specific: failed_stage + compose_output + per-service logs
      if (r.agent_name === 'Deploy') {
        const ds = classifyDeployStage(oj.failed_stage);
        expand += `<div class="err-card sev-${ds.sev}"><div class="err-head"><span class="err-title">${esc(ds.label)}</span></div></div>`;
        if (oj.compose_output) expand += renderCodeDisclosure('в–ј compose output (tail)', oj.compose_output);
        if (oj.logs) {
          for (const svc of Object.keys(oj.logs)) {
            if (oj.logs[svc]) expand += renderCodeDisclosure(`в–ј logs.${svc}`, oj.logs[svc]);
          }
        }
      }
      // PostTest-specific: per-endpoint trace
      if (r.agent_name === 'PostTest' && Array.isArray(oj.results)) {
        for (const ep of oj.results) {
          if (ep.pass) continue;
          const errs = (ep.errors || []).map((e) => `вҖў ${esc(e)}`).join('<br>');
          const trace = ep.trace || {};
          expand += `
            <div class="err-card sev-error">
              <div class="err-head"><span class="area-chip posttest">PostTest</span><span class="err-title">${esc(ep.method || '')} ${esc(ep.endpoint || '')}</span></div>
              <div class="err-body">
                <p>url: <code>${esc(trace.url || '')}</code></p>
                <p>status: <code>${esc(trace.status)}</code></p>
                ${errs ? `<p>${errs}</p>` : ''}
                ${trace.request_body  ? renderCodeDisclosure('в–ј request body',  JSON.stringify(trace.request_body, null, 2))  : ''}
                ${trace.response_body ? renderCodeDisclosure('в–ј response body', JSON.stringify(trace.response_body, null, 2)) : ''}
              </div>
            </div>`;
        }
      }
    } else if (r.status === 'SUCCESS') {
      // Layer 3: silent warnings as chips
      const chips = renderMetaChips(oj);
      if (chips) expand += chips;
      // Compact summary for Deploy / PostTest success
      if (r.agent_name === 'Deploy' && oj.ports) {
        expand += `<div class="muted" style="font-size:11px; margin-top:4px;">ports: be=${oj.ports.be} fe=${oj.ports.fe} В· up in ${oj.duration_ms}ms</div>`;
      }
      if (r.agent_name === 'PostTest' && oj.total != null) {
        expand += `<div class="muted" style="font-size:11px; margin-top:4px;">${oj.passed}/${oj.total} endpoints В· ${oj.duration_ms}ms В· baseUrl=${esc(oj.baseUrl || '')}</div>`;
      }
    }

    const expandWrapped = expand
      ? `<details class="disclosure" data-runidx="${idx}"><summary>мғҒм„ё ліҙкё°</summary><div class="disclosure-body">${expand}</div></details>`
      : '';

    return `
      <div class="run-row ${sev}">
        <span class="area-chip ${area}">${esc(r.agent_name)}</span>
        ${tgt}
        <span>${pill(r.status)}</span>
        <span class="ts">${ts}</span>
      </div>
      ${expandWrapped}`;
  });
  return `<h2 style="margin-top: 14px;">нғҖмһ„лқјмқё (Phase 1~9)</h2><div class="timeline">${rows.join('')}</div>`;
}

/** Render task_state rows with stage_logs disclosure (Lint stage details). */
function renderStates(states) {
  if (!states || states.length === 0) return '';
  const rows = states.map((s) => {
    const cls = areaClass('lint', s.target);
    const sev = s.status === 'FAILED' ? 'sev-error'
              : s.status === 'SUCCESS' ? 'sev-ok'
              : 'sev-info';
    let detail = '';
    if (s.status === 'FAILED') {
      const ls = classifyLintStage(s.failed_stage);
      const sl = safeJson(s.stage_logs);
      detail += `<div class="err-card sev-${ls.sev}"><div class="err-head"><span class="err-title">${esc(ls.label)} В· retry ${s.retry_count}/3</span></div></div>`;
      if (sl) {
        for (const stage of ['stage1', 'stage2', 'stage3']) {
          const x = sl[stage];
          if (!x) continue;
          const head = `${stage}: ${x.pass ? 'вң“ pass' : 'вң— fail'} В· exit ${x.code} В· ${esc(x.cmd || '')}`;
          let body = '';
          if (x.stdout) body += `<b>stdout:</b><div class="code-block">${esc(x.stdout)}</div>`;
          if (x.stderr) body += `<b>stderr:</b><div class="code-block">${esc(x.stderr)}</div>`;
          detail += `<details class="disclosure"><summary>${head}</summary><div class="disclosure-body">${body || '<span class="dim">(empty)</span>'}</div></details>`;
        }
      }
      if (s.fix_instructions) {
        detail += renderCodeDisclosure('в–ј лӢӨмқҢ лқјмҡҙл“ң BE/FE Agentм—җ м „лӢ¬лҗ  fix_instructions', s.fix_instructions);
      }
    }
    return `
      <div class="run-row ${sev}">
        <span class="area-chip ${cls}">Lint</span>
        <span class="target">/ ${esc(s.target)}</span>
        <span>${pill(s.status)}</span>
        <span class="target">retry ${s.retry_count}${s.failed_stage ? ' В· ' + esc(s.failed_stage) : ''}</span>
        <span class="ts">${fmtTime(s.updated_at)}</span>
      </div>
      ${detail ? `<details class="disclosure"><summary>Lint мғҒм„ё</summary><div class="disclosure-body">${detail}</div></details>` : ''}`;
  });
  return `<h2 style="margin-top: 14px;">TASK_STATE (мҳҒм—ӯлі„)</h2><div class="timeline">${rows.join('')}</div>`;
}

async function loadDetail() {
  if (!selectedTaskId) return;
  // Terminal мғҒнғң(verdict нҷ•м •)л©ҙ лҚ” ліҖн•  мқј м—ҶмңјлӢҲ polling мһҗмІҙлҘј кұҙл„ҲлңҖ.
  // нҺјм№ң disclosureк°Җ к·ёлҢҖлЎң мӮҙм•„лӮЁлҠ”лӢӨ.
  if (lastDetailTerminal) return;

  const data = await fetchJSON(`/api/tasks/${encodeURIComponent(selectedTaskId)}`);
  const { decision, states, runs } = data;

  // м§Ғм „ мқ‘лӢөкіј л№„көҗ вҖ” RUNNING мӨ‘м—җлҸ„ мқҳлҜё мһҲлҠ” ліҖнҷ”к°Җ м—Ҷмңјл©ҙ re-render skip.
  // runs/statesлҠ” timestamp мқјл¶Җл§Ң fingerprintм—җ нҸ¬н•Ё (id+statusл©ҙ м¶©л¶„).
  const fingerprint = JSON.stringify({
    d: decision && {
      v: decision.final_verdict,
      t: decision.final_result_text,
      u: decision.updated_at,
    },
    s: (states || []).map((s) => [s.id, s.target, s.status, s.retry_count, s.failed_stage]),
    r: (runs || []).map((r) => [r.id, r.agent_name, r.target, r.status, r.ended_at]),
  });
  if (fingerprint === lastDetailHash) return;
  lastDetailHash = fingerprint;

  const root = $('#detail');
  let html = '';

  // (B) "мөңмў… кІ°кіј" нҒ° м№ҙл“ң вҖ” verdict + final_result_textлҘј к°ҖмһҘ мң„м—җ н’Җ л…ём¶ң.
  html += renderFinalResultCard(decision, states, runs);

  if (!decision) {
    html += '<div class="muted" style="margin-top: 8px;">(м•„м§Ғ log_agent_decisions row м—ҶмқҢ вҖ” orchestratorк°Җ Phase 1 м§„мһ… м „мқҙкұ°лӮҳ, мқјл°ҳ cycleмқҙ м•„лӢҢ manual мһ‘м—…[Redeploy л“ұ])</div>';
  }

  // Layer 1 вҖ” drill-downмҡ© л¶„лҘҳ м№ҙл“ң (final-cardмҷҖ мӨ‘ліөмқј мҲҳ мһҲм§Җл§Ң к¶ҢмһҘ лҢҖмқ‘мқҙ к°ҷмқҙ ліҙмһ„).
  html += renderTopErrorSummary(decision, states, runs);

  // Deploy run with ports вҶ’ "FE/BE м—ҙкё°" + "Stop containers" strip (existing).
  const deployRun = (runs || []).find((r) => r.agent_name === 'Deploy' && r.status === 'SUCCESS');
  if (deployRun) {
    const oj = safeJson(deployRun.output_json) || {};
    if (oj.ports && !oj.skipped) {
      const { fe, be } = oj.ports;
      html += `
        <div class="err-card sev-ok" style="margin-top: 10px;">
          <div class="err-head"><span class="err-title">л°°нҸ¬лҗң м„ңл№„мҠӨ (DEPLOY_TEARDOWN_ON_PASS=offмқј л•Ң PASS нӣ„м—җлҸ„ мң м§Җ)</span></div>
          <div class="err-body">
            <a href="http://${PUBLIC_HOST}:${fe}" target="_blank" rel="noopener" style="margin-right: 12px; color: var(--accent); font-weight: 600;">рҹҢҗ FE м—ҙкё° (:${fe})</a>
            <a href="http://${PUBLIC_HOST}:${be}" target="_blank" rel="noopener" style="margin-right: 12px; color: var(--accent); font-weight: 600;">рҹ”Ң BE м—ҙкё° (:${be})</a>
            <button class="secondary" id="stopContainersBtn" style="margin-left: 6px;">рҹӣ‘ Stop containers</button>
          </div>
        </div>`;
    }
  }

  // Layer 2 вҖ” timeline with per-run area chip + severity colour + expand
  html += renderTimeline(runs);

  // task_state rows (Lint) with stage_logs disclosure
  html += renderStates(states);

  root.innerHTML = html;

  // verdictк°Җ нҷ•м •лҗҳл©ҙ мқҙнӣ„ pollingмқҙ detailмқ„ кұҙл“ңлҰ¬м§Җ м•ҠлҸ„лЎқ мһ кёҲ.
  // selectTask()к°Җ нҳём¶ңлҗҳл©ҙ мқҙ мһ кёҲмқҙ н•ҙм ңлҗңлӢӨ.
  if (decision && ['PASS', 'FAIL', 'ERROR', 'SUCCESS', 'FAILED'].includes(decision.final_verdict)) {
    lastDetailTerminal = true;
  }

  // Bind Stop containers button if it was rendered.
  const stopBtn = document.getElementById('stopContainersBtn');
  if (stopBtn) {
    stopBtn.addEventListener('click', async () => {
      if (!confirm('нҳ„мһ¬ мӣҢнҒ¬нҠёлҰ¬мқҳ docker compose down мӢӨн–ү. кі„мҶҚн• к№Ңмҡ”?')) return;
      stopBtn.disabled = true;
      stopBtn.textContent = 'рҹӣ‘ stoppingвҖҰ';
      try {
        const r = await fetchJSON('/api/stop-containers', { method: 'POST' });
        stopBtn.textContent = r.ok ? 'рҹӣ‘ stopped' : 'рҹӣ‘ failed';
      } catch (_) { stopBtn.textContent = 'рҹӣ‘ failed'; }
      setTimeout(() => { stopBtn.disabled = false; stopBtn.textContent = 'рҹӣ‘ Stop containers'; }, 1800);
    });
  }
}

async function pollRunStatus() {
  const r = await fetchJSON('/api/run');
  if (r.running) {
    const cur = r.current || {};
    const elapsed = cur.startedAt ? Math.round((Date.now() - cur.startedAt) / 1000) : 0;
    $('#runStatus').innerHTML =
      `<span class="pill RUNNING">RUNNING</span> pid=${cur.pid || '?'} ` +
      `task_id=${cur.task_id || '(starting...)'} ` +
      `elapsed=${elapsed}s`;
    $('#runBtn').disabled = true;
    if (cur.task_id && cur.task_id !== selectedTaskId) selectTask(cur.task_id);
    return;
  }
  $('#runBtn').disabled = false;

  // (A) idleмқј л•Ң л§Ҳм§Җл§ү taskмқҳ verdict + м§§мқҖ м—җлҹ¬ л©”мӢңм§ҖлҘј л…ём¶ң вҖ” мӢңм„ 
  // 1мҲңмң„ мҳҒм—ӯмқёлҚ° "idle"л§Ң ліҙмҳҖлҚҳ кІғмқ„ ліҙмҷ„. нҒҙлҰӯн•ҳл©ҙ detail panelлЎң м җн”„.
  // loadTasks кІ°кіјлҘј к·ёлҢҖлЎң нҷңмҡ© (лі„лҸ„ fetch м—ҶмқҢ).
  const lastTaskRow = document.querySelector('#taskTable tbody tr');
  if (!lastTaskRow) {
    $('#runStatus').textContent = 'idle';
    return;
  }
  const v = (lastTaskRow.className.match(/verdict-(\S+)/) || [])[1] || '';
  const tid = lastTaskRow.children[1]?.textContent || '';
  let snippet = '';
  if (v === 'ERROR' || v === 'FAIL' || v === 'FAILED') {
    snippet = ' вҖ” мһҗм„ён•ң м—җлҹ¬ л©”мӢңм§ҖлҠ” мҡ°мёЎ мғҒм„ё нҢЁл„җ мөңмғҒлӢЁ м№ҙл“ң м°ёкі ';
  } else if (v === 'PASS' || v === 'SUCCESS') {
    snippet = ' вҖ” нҶөкіј';
  }
  $('#runStatus').innerHTML =
    `idle &nbsp;|&nbsp; л§Ҳм§Җл§ү task: ${pill(v)} ` +
    `<a href="#" id="runStatusJump" style="font-family: ui-monospace, monospace; font-size: 11px; color: var(--accent);">${esc(tid)}</a>` +
    `<span class="muted">${esc(snippet)}</span>`;
  const jump = document.getElementById('runStatusJump');
  if (jump && tid) {
    jump.addEventListener('click', (e) => { e.preventDefault(); selectTask(tid); });
  }
}

$('#runBtn').addEventListener('click', async () => {
  $('#runBtn').disabled = true;
  const prompt = $('#prompt').value;
  const r = await fetchJSON('/api/run', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt }),
  });
  if (!r.ok && r._status === 409) {
    $('#runStatus').textContent = 'busy вҖ” another run is already executing';
  }
});

/**
 * Redeploy мӢӨн–ү + кІ°кіј мІҳлҰ¬ + м„ұкіө мӢң FE нҺҳмқҙм§ҖлҘј мғҲ нғӯм—җ мһҗлҸҷ мҳӨн”Ҳ.
 *
 * л‘җ л°ңнҷ”м җм—җм„ң кіөмң :
 *   - рҹҡҖ Redeploy лІ„нҠј нҒҙлҰӯ (мҲҳлҸҷ)
 *   - вҸ® Reset to origin/main м„ұкіө м§Ғнӣ„ (мһҗлҸҷ chain) вҖ” git/м»Ён…Ңмқҙл„Ҳ мғҒнғң
 *     mismatch л°©м§Җ. resetл§Ң н•ҳкі  redeploy м•Ҳ н•ҳл©ҙ м»Ён…Ңмқҙл„ҲлҠ” мҳӣ мҪ”л“ңлЎң
 *     л–  мһҲм–ҙ gitмҷҖ лҸҷмһ‘мқҙ м–ҙкёӢлӮЁ.
 *
 * @param {{ context: 'manual' | 'after-rollback' }} opts
 * @returns {Promise<{ok: boolean}>}
 */
async function executeRedeploy(opts = { context: 'manual' }) {
  const r = await fetchJSON('/api/redeploy', { method: 'POST' });
  if (r.ok) {
    const p = r.ports || {};
    const feUrl = `http://${PUBLIC_HOST}:${p.fe}`;
    const beUrl = `http://${PUBLIC_HOST}:${p.be}`;
    const prefix = opts.context === 'after-rollback'
      ? 'Rollback нӣ„ Redeploy мҷ„лЈҢ'
      : 'Redeploy мҷ„лЈҢ';
    alert(
      `${prefix} (task_id=${r.task_id})\n\n` +
      `рҹҢҗ FE: ${feUrl}\n` +
      `рҹ”Ң BE: ${beUrl}\n\n` +
      `нҷ•мқёмқ„ лҲ„лҘҙл©ҙ FE нҺҳмқҙм§ҖлҘј мғҲ нғӯм—җ лқ„мӣҒлӢҲлӢӨ.`
    );
    // alert лҸҷкё° мў…лЈҢ м§Ғнӣ„ user-gesture м»Ён…ҚмҠӨнҠёк°Җ мӮҙм•„мһҲм–ҙ popup blocker
    // нҶөкіј. noopenerлҠ” мғҲ м°Ҫм—җм„ң openerлҘј лӘ» л§Ңм§ҖкІҢ н•ҳлҠ” ліҙм•Ҳ best practice.
    window.open(feUrl, '_blank', 'noopener');
  } else if (r._status === 400) {
    // DEPLOY_MODE=off rejection вҖ” surface server message verbatim.
    alert(r.error || 'Redeploy кұ°л¶ҖлҗЁ (DEPLOY_MODE=off).');
  } else if (r._status === 409) {
    alert(r.error || 'лӢӨлҘё мһ‘м—… м§„н–ү мӨ‘. лҒқлӮң нӣ„ лӢӨмӢң мӢңлҸ„н•ҳм„ёмҡ”.');
  } else {
    alert('Redeploy мӢӨнҢЁ: ' + (r.error || r._text || 'unknown'));
  }
  return r;
}

/**

 *
 * - ahead commitмқҙ м—Ҷкұ°лӮҳ / dirtyк°Җ мһҲкұ°лӮҳ / ff л¶Ҳк°Җн•ҳл©ҙ вҶ’ button.disabled=true,
 *   title мҶҚм„ұм—җ мӮ¬мң  н‘ңкё° (л§Ҳмҡ°мҠӨ нҳёлІ„ мӢң tooltip).
 * - мӮ¬мҡ©мһҗк°Җ commitн•ҳл©ҙ лӢӨмқҢ polling cycle(1.5s)м—җ мһҗлҸҷмңјлЎң нҷңм„ұнҷ”.
 *
 * ?fetch=0 мҳөм…ҳмңјлЎң git fetchлҠ” мғқлһө вҖ” л„ӨнҠёмӣҢнҒ¬ round-trip л¶ҖлӢҙмқ„ н”јн•ңлӢӨ.
 * мӮ¬мҡ©мһҗк°Җ мӢӨм ң нҒҙлҰӯн•ҳлҠ” мӢңм җм—” click handlerм—җм„ң fetch нҸ¬н•Ёлҗң previewлҘј
 * лӢӨмӢң нҳём¶ңн•ҙ freshnessлҘј ліҙмһҘ.
 */
async function pollMergeStatus() {
  const btn = $('#mergeBtn');
  if (!btn) return;
  try {
    const p = await fetchJSON('/api/merge-preview?fetch=0');
    if (p.can_merge) {
      btn.disabled = false;
      const aheadCount = (p.ahead_commits || []).length;
      btn.title = `${p.branch} вҶ’ origin/main fast-forward (${aheadCount}к°ң commit)`;
    } else {
      btn.disabled = true;
      btn.title = p.reason || 'merge л¶Ҳк°Җ мғҒнғң';
    }
  } catch (_) {
    // API мӢӨнҢЁ мӢңм—” м•Ҳм „мқ„ мң„н•ҙ disabled мң м§Җ (мқҙлҜё disabledл©ҙ к·ёлҢҖлЎң).
    btn.disabled = true;
    btn.title = 'merge мғҒнғң нҷ•мқё мӢӨнҢЁ';
  }
}

      `2) git push origin ${p.branch}:main\n\n` +
      `лӢӨмқҢ ${ahead.length}к°ң commitмқҙ origin/mainмңјлЎң м „м§„:\n` +
      ahead.slice(0, 10).map((c) => '  вҖў ' + c).join('\n') +
      (ahead.length > 10 ? `\n  ... мҷё ${ahead.length - 10}к°ң` : '') +
      '\n\nforce push м•„лӢҢ fast-forwardл§Ң мӢңлҸ„н•©лӢҲлӢӨ. м§„н–үн• к№Ңмҡ”?';
    if (!confirm(msg)) return;
    $('#mergeBtn').textContent = 'рҹ”Җ mergingвҖҰ';
    const r = await fetchJSON('/api/merge', { method: 'POST' });
    if (r.ok) {
      const lines = [
        r.no_op ? 'вң“ мқҙлҜё лҸҷкё°нҷ” мғҒнғң' : `вң“ Merge мҷ„лЈҢ (${r.pushed_commits ? r.pushed_commits.length : 0}к°ң commit)`,
        r.pushed_branch ? `  вҖў origin/${r.branch} push мҷ„лЈҢ` : '',
        r.merged_to_main ? '  вҖў origin/main fast-forward мҷ„лЈҢ' : '',
        '',
        r.notice || '',
      ].filter(Boolean);
      alert(lines.join('\n'));
    } else {
      // л¶Җл¶„ м„ұкіө мјҖмқҙмҠӨ (branchлҠ” pushлҗҗлҠ”лҚ° main push мӢӨнҢЁ) лӘ…мӢң
      const partial = r.pushed_branch && !r.merged_to_main
        ? `\n\n(л¶Җл¶„ м„ұкіө: origin/${p.branch}лҠ” pushлҗҗм§Җл§Ң origin/main ffлҠ” мӢӨнҢЁ)`
        : '';
      alert('Merge мӢӨнҢЁ: ' + (r.error || r._text || 'unknown') + partial);
    }
  } catch (e) {
    alert('Merge нҳём¶ң мӢӨнҢЁ: ' + e.message);
  } finally {
    $('#mergeBtn').disabled = false;
    $('#mergeBtn').textContent = 'рҹ”Җ Merge to main';
  }
});

(async function main() {
  await Promise.all([loadEnv(), loadTasks()]);
  setInterval(() => { loadTasks(); loadDetail(); pollRunStatus(); pollMergeStatus(); }, 1500);
  pollRunStatus();
  pollMergeStatus();
})();
</script>
