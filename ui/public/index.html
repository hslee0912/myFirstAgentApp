<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Server injects .env PUBLIC_HOST here at request time. The literal
       __PUBLIC_HOST__ is the placeholder served from disk (only visible if
       someone reads the file directly); the actual response substitutes it. -->
  <meta name="public-host" content="__PUBLIC_HOST__" />
  <title>myFirstAgentApp — control panel</title>
  <style>
    :root {
      --bg: #0f1116;
      --panel: #181b22;
      --panel-2: #1f232c;
      --text: #e2e6ee;
      --muted: #8089a0;
      --accent: #6ea8ff;
      --pass: #4ade80;
      --fail: #ef4444;
      --warn: #fbbf24;
      --border: #2a2f3a;

      /* Area chip colours (label-level identification) */
      --area-orchestrator: #6b7280;
      --area-codechecker:  #a78bfa;
      --area-be:           #4ade80;
      --area-fe:           #6ea8ff;
      --area-lint:         #fbbf24;
      --area-deploy:       #38bdf8;
      --area-posttest:     #f472b6;

      /* Severity colours (box-level — error/warn/info/ok) */
      --sev-error-fg: #ef4444;
      --sev-error-bg: rgba(239, 68, 68, 0.10);
      --sev-warn-fg:  #fb923c;
      --sev-warn-bg:  rgba(251, 146, 60, 0.10);
      --sev-info-fg:  #fbbf24;
      --sev-info-bg:  rgba(251, 191, 36, 0.09);
      --sev-ok-fg:    #4ade80;
      --sev-ok-bg:    rgba(74, 222, 128, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { margin: 0; font-size: 16px; font-weight: 600; }
    header .muted { color: var(--muted); font-size: 12px; }
    .grid {
      display: grid;
      grid-template-columns: 460px 1fr;
      gap: 16px;
      padding: 16px;
    }
    @media (max-width: 1000px) { .grid { grid-template-columns: 1fr; } }
    section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }
    section h2 {
      margin: 0 0 10px 0;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    label { display: block; margin: 6px 0; font-size: 12px; color: var(--muted); }
    input[type="text"], textarea, select {
      width: 100%;
      padding: 7px 9px;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font: inherit;
    }
    textarea { resize: vertical; min-height: 80px; }
    button {
      padding: 7px 12px;
      background: var(--accent);
      color: #0a0d14;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .row { display: flex; gap: 8px; align-items: center; }
    .row > * { flex: 1; }
    .row > button { flex: 0; }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
    }
    .pill.PASS, .pill.SUCCESS { background: var(--pass); color: #0a0d14; }
    .pill.FAIL, .pill.FAILED { background: var(--fail); color: #fff; }
    .pill.ERROR { background: var(--fail); color: #fff; }
    .pill.IN_PROGRESS, .pill.RUNNING, .pill.PENDING { background: var(--warn); color: #0a0d14; }
    pre {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      overflow-x: auto;
      font-size: 12px;
      max-height: 360px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; }
    tr.clickable { cursor: pointer; }
    tr.clickable:hover { background: var(--panel-2); }
    /* (C) Task table verdict-based row highlight — 한눈에 ERROR/FAIL/PASS 구분 */
    tr.verdict-ERROR td:first-child,
    tr.verdict-FAIL  td:first-child,
    tr.verdict-FAILED td:first-child { box-shadow: inset 3px 0 0 var(--fail); }
    tr.verdict-PASS  td:first-child,
    tr.verdict-SUCCESS td:first-child { box-shadow: inset 3px 0 0 var(--pass); }
    tr.verdict-IN_PROGRESS td:first-child,
    tr.verdict-RUNNING td:first-child { box-shadow: inset 3px 0 0 var(--warn); }

    /* (B) Final-result banner — Detail panel 최상단, 한 화면 안에 즉시 보이도록 큼직하게 */
    .final-card {
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 8px;
      border-left: 6px solid var(--muted);
      background: var(--panel-2);
    }
    .final-card.v-ERROR, .final-card.v-FAIL, .final-card.v-FAILED {
      border-left-color: var(--fail);
      background: var(--sev-error-bg);
    }
    .final-card.v-PASS, .final-card.v-SUCCESS {
      border-left-color: var(--pass);
      background: var(--sev-ok-bg);
    }
    .final-card.v-IN_PROGRESS, .final-card.v-RUNNING {
      border-left-color: var(--warn);
      background: var(--sev-warn-bg);
    }
    .final-card .final-head {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 6px;
    }
    .final-card .final-title {
      font-size: 14px; font-weight: 600; color: var(--text);
    }
    .final-card .final-msg {
      font-family: ui-monospace, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      margin-top: 4px;
    }
    .final-card .final-meta {
      font-size: 11px; color: var(--muted); margin-top: 6px;
    }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .status { font-size: 12px; color: var(--muted); }
    .timeline { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
    .phase {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
    }
    .phase .label { flex: 1; }
    .phase .ts { color: var(--muted); font-size: 11px; }

    /* ───── Area chip — colours the agent name with its area colour ───── */
    .area-chip {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #0a0d14;
      flex: 0 0 auto;
    }
    .area-chip.orchestrator { background: var(--area-orchestrator); color: #fff; }
    .area-chip.codechecker  { background: var(--area-codechecker); color: #fff; }
    .area-chip.be           { background: var(--area-be); }
    .area-chip.fe           { background: var(--area-fe); }
    .area-chip.lint         { background: var(--area-lint); }
    .area-chip.deploy       { background: var(--area-deploy); }
    .area-chip.posttest     { background: var(--area-posttest); }

    /* ───── Error / warning card (severity-coloured box) ───── */
    .err-card {
      margin: 10px 0;
      border: 1px solid var(--border);
      border-left: 4px solid var(--border);
      border-radius: 6px;
      background: var(--panel-2);
      padding: 12px 14px;
    }
    .err-card.sev-error { border-left-color: var(--sev-error-fg); background: var(--sev-error-bg); }
    .err-card.sev-warn  { border-left-color: var(--sev-warn-fg);  background: var(--sev-warn-bg); }
    .err-card.sev-info  { border-left-color: var(--sev-info-fg);  background: var(--sev-info-bg); }
    .err-card.sev-ok    { border-left-color: var(--sev-ok-fg);    background: var(--sev-ok-bg); }

    .err-card .err-head {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 6px;
      font-size: 13px; font-weight: 600;
    }
    .err-card .err-title { flex: 1; }
    .err-card .err-body { font-size: 12px; color: var(--text); }
    .err-card .err-body p { margin: 4px 0; }
    .err-card .err-body code,
    .err-card .err-body kbd {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      background: var(--panel);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 11px;
    }
    .err-card .err-reco {
      margin-top: 8px;
      padding: 6px 10px;
      background: rgba(255,255,255,0.04);
      border-left: 2px solid var(--muted);
      border-radius: 3px;
      font-size: 12px;
      color: var(--muted);
    }
    .err-card .err-reco b { color: var(--text); }

    /* ───── Expandable / collapsible disclosure ───── */
    details.disclosure {
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--panel-2);
    }
    details.disclosure > summary {
      cursor: pointer;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--muted);
      user-select: none;
    }
    details.disclosure[open] > summary { color: var(--text); border-bottom: 1px solid var(--border); }
    details.disclosure > .disclosure-body { padding: 8px 10px; }

    /* ───── Monospace code block for logs / stack traces ───── */
    .code-block {
      background: #0a0d14;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      line-height: 1.5;
      max-height: 320px;
      overflow: auto;
      white-space: pre;
      color: #c8d2e0;
    }
    .code-block.wrap { white-space: pre-wrap; word-break: break-word; }
    .code-block .dim { color: var(--muted); }

    /* ───── Run row v2 (timeline) ───── */
    .run-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-left-width: 3px;
      border-radius: 6px;
      font-size: 12px;
    }
    .run-row.sev-error { border-left-color: var(--sev-error-fg); }
    .run-row.sev-warn  { border-left-color: var(--sev-warn-fg); }
    .run-row.sev-info  { border-left-color: var(--sev-info-fg); }
    .run-row.sev-ok    { border-left-color: var(--sev-ok-fg); }
    .run-row .name { font-weight: 600; }
    .run-row .target { color: var(--muted); font-size: 11px; }
    .run-row .ts { color: var(--muted); font-size: 11px; margin-left: auto; }

    .timeline { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }

    /* ───── Tiny meta-row chips for silent warnings on SUCCESS runs ───── */
    .meta-chip {
      display: inline-block;
      margin: 2px 4px 2px 0;
      padding: 2px 7px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 3px;
      font-size: 11px;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .meta-chip.warn { color: var(--sev-warn-fg); border-color: var(--sev-warn-fg); }
  </style>
</head>
<body>
  <header>
    <h1>myFirstAgentApp</h1>
    <span class="muted">control panel (Phase 1~9 시각화 · .env GUI editor · 단일 실행 큐)</span>
  </header>

  <div class="grid">
    <section>
      <h2>새 실행</h2>
      <label for="prompt">user_request (비우면 기본 시나리오)</label>
      <textarea id="prompt" placeholder="여기에 작업 요청을 입력하세요"></textarea>
      <div class="toolbar" style="margin-top: 8px;">
        <button id="runBtn">▶ Run pipeline</button>
        <button id="redeployBtn" class="secondary" title="현재 worktree 코드 그대로 docker compose up (PostTest 안 함)">🚀 Redeploy</button>
        <button id="resetDbBtn" class="secondary">⟲ reset-db</button>
        <button id="initBtn" class="secondary" style="border-color: var(--warn); color: var(--warn);" title="BE/src + FE/src 삭제 + DB 전체 truncate — 새 cycle 직전 상태로 초기화">🧹 Init project</button>
        <button id="restartUiBtn" class="secondary" title="UI 서버 process 재가동 — 도구 코드(ui/routes, agents, lib) 변경 시 사용">🔄 Restart UI</button>
        <button id="rollbackBtn" class="secondary" style="border-color: var(--fail); color: var(--fail);" title="git reset --hard origin/main + git clean + .env reset">⏮ Reset to origin/main</button>
        <!-- 초기 disabled: pollMergeStatus가 첫 응답을 받기 전엔 클릭 자체를 차단.
             ahead commit이 생겨야만 활성화되고, 비활성 사유는 title 속성에서 hover로 노출. -->
        <button id="mergeBtn" class="secondary" disabled style="border-color: var(--accent); color: var(--accent);" title="merge 가능 여부 확인 중...">🔀 Merge to main</button>
      </div>
      <div class="status" id="runStatus">idle</div>

      <h2 style="margin-top: 18px;">.env 토글</h2>
      <div id="envEditor"></div>
    </section>

    <section>
      <h2>최근 task (클릭하면 상세)</h2>
      <table id="taskTable">
        <thead><tr><th>id</th><th>task_id</th><th>verdict</th><th>updated_at</th></tr></thead>
        <tbody></tbody>
      </table>

      <h2 style="margin-top: 18px;">상세 — <span id="detailTaskId" class="muted">(선택 안 됨)</span></h2>
      <div id="detail"></div>
    </section>
  </div>

<script>
const $ = (sel) => document.querySelector(sel);
const fmtTime = (ts) => ts ? new Date(ts).toLocaleString() : '';
const pill = (val) => val ? `<span class="pill ${val}">${val}</span>` : '';

let selectedTaskId = null;

// (D-fix) Detail panel re-render 방지용 캐시.
//   - lastDetailHash: 직전에 그린 응답의 fingerprint. 1.5s polling에서 data가
//     안 바뀌면 innerHTML을 다시 안 쓴다 → 사용자가 펼친 <details>가 안 닫힘.
//   - lastDetailTerminal: verdict가 PASS/FAIL/ERROR로 확정되면 더 fetch도 안 함
//     (값이 변할 일 없음). selectTask()는 이 둘을 reset해 강제 re-render.
let lastDetailHash = '';
let lastDetailTerminal = false;

// Browser host for FE/BE service links. Initial value comes from the
// <meta name="public-host"> that ui/server.js injects per request (from
// .env PUBLIC_HOST). loadEnv() refreshes it on every poll so a UI toggle
// propagates without a page reload. The meta fallback "__PUBLIC_HOST__"
// is what you'd see only if the file is opened from disk (i.e. not via
// the UI server) — treat that as "host unknown, do not link out".
let PUBLIC_HOST =
  document.querySelector('meta[name="public-host"]')?.content || '';
if (PUBLIC_HOST === '__PUBLIC_HOST__') PUBLIC_HOST = '';

async function fetchJSON(url, opts) {
  const r = await fetch(url, opts);
  const ct = r.headers.get('content-type') || '';
  if (!ct.includes('json')) {
    return { _status: r.status, _text: await r.text() };
  }
  return r.json();
}

// 3-state toggle keys: each maps an on/off checkbox to two string values.
// Anything else falls back to the text+save row layout below.
const TOGGLE_KEYS = {
  COMMIT_MODE:              { on: 'auto', off: 'manual' },
  VALIDATION_MODE:          { on: 'on',   off: 'off' },
  DEPLOY_MODE:              { on: 'on',   off: 'off' },
  DEPLOY_TEARDOWN_ON_PASS:  { on: 'on',   off: 'off' },
};

async function putEnv(key, value) {
  return fetchJSON('/api/env', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ [key]: value }),
  });
}

async function loadEnv() {
  const data = await fetchJSON('/api/env');
  // Refresh PUBLIC_HOST so subsequent FE/BE links pick up any UI edit
  // (or .env reset) without requiring a page reload.
  if (data.editable && data.editable.PUBLIC_HOST) {
    PUBLIC_HOST = data.editable.PUBLIC_HOST;
  }
  const root = $('#envEditor');
  root.innerHTML = '';

  // Toggle row at the top — checked = "on value", unchecked = "off value".
  // change event writes to .env immediately.
  for (const k of data.editableKeys) {
    if (!TOGGLE_KEYS[k]) continue;
    const t = TOGGLE_KEYS[k];
    const val = data.editable[k] ?? '';
    const checked = val === t.on;
    const wrap = document.createElement('div');
    wrap.className = 'row';
    wrap.style.marginBottom = '4px';
    wrap.innerHTML =
      `<label style="flex:0 0 200px; margin:0; font-family: ui-monospace, monospace;">${k}</label>` +
      `<label style="flex:1; display:flex; align-items:center; gap:8px; margin:0;">` +
        `<input type="checkbox" data-toggle="${k}" ${checked ? 'checked' : ''} />` +
        `<span data-toggle-value="${k}" style="font-family: ui-monospace, monospace; color: var(--muted); font-size: 12px;">${checked ? t.on : t.off}</span>` +
      `</label>` +
      `<span data-toggle-status="${k}" class="status" style="flex:0 0 60px; text-align:right;"></span>`;
    root.appendChild(wrap);
  }

  // The remaining keys (models, ports, retries, ...) keep the text+save layout.
  for (const k of data.editableKeys) {
    if (TOGGLE_KEYS[k]) continue;
    const val = data.editable[k] ?? '';
    const wrap = document.createElement('div');
    wrap.className = 'row';
    wrap.style.marginBottom = '4px';
    wrap.innerHTML =
      `<label style="flex:0 0 200px; margin:0; font-family: ui-monospace, monospace;">${k}</label>` +
      `<input type="text" data-key="${k}" value="${val.replace(/"/g, '&quot;')}" />` +
      `<button class="secondary" data-save="${k}">save</button>`;
    root.appendChild(wrap);
  }

  // Wire toggle change → immediate PUT.
  root.querySelectorAll('input[data-toggle]').forEach((cb) => {
    cb.addEventListener('change', async () => {
      const key = cb.getAttribute('data-toggle');
      const t = TOGGLE_KEYS[key];
      const value = cb.checked ? t.on : t.off;
      const valueEl = root.querySelector(`[data-toggle-value="${key}"]`);
      const statusEl = root.querySelector(`[data-toggle-status="${key}"]`);
      cb.disabled = true;
      statusEl.textContent = 'saving…';
      try {
        const res = await putEnv(key, value);
        if (res.ok) {
          valueEl.textContent = value;
          statusEl.textContent = '✓ saved';
        } else {
          // Revert checkbox state on failure.
          cb.checked = !cb.checked;
          statusEl.textContent = '✗ fail';
        }
      } catch (_) {
        cb.checked = !cb.checked;
        statusEl.textContent = '✗ fail';
      } finally {
        cb.disabled = false;
        setTimeout(() => { statusEl.textContent = ''; }, 1500);
      }
    });
  });

  // Wire text+save buttons (unchanged behavior).
  root.querySelectorAll('button[data-save]').forEach((btn) => {
    btn.addEventListener('click', async () => {
      const key = btn.getAttribute('data-save');
      const input = root.querySelector(`input[data-key="${key}"]`);
      const value = input.value;
      btn.disabled = true;
      try {
        const res = await putEnv(key, value);
        if (res.ok) {
          btn.textContent = 'saved';
          setTimeout(() => { btn.textContent = 'save'; btn.disabled = false; }, 1200);
        } else {
          btn.textContent = 'fail';
          setTimeout(() => { btn.textContent = 'save'; btn.disabled = false; }, 1500);
        }
      } catch (_) { btn.disabled = false; }
    });
  });
}

async function loadTasks() {
  const data = await fetchJSON('/api/tasks');
  const tbody = $('#taskTable tbody');
  tbody.innerHTML = '';
  for (const t of (data.tasks || [])) {
    const tr = document.createElement('tr');
    // (C) verdict class를 추가해 CSS의 좌측 변 강조가 ERROR/PASS row에 자동 적용.
    tr.className = `clickable${t.final_verdict ? ' verdict-' + t.final_verdict : ''}`;
    if (selectedTaskId && t.task_id === selectedTaskId) tr.classList.add('selected');
    tr.innerHTML =
      `<td>${t.id}</td>` +
      `<td style="font-family: ui-monospace, monospace; font-size: 11px;">${t.task_id}</td>` +
      `<td>${pill(t.final_verdict)}</td>` +
      `<td class="muted">${fmtTime(t.updated_at)}</td>`;
    tr.addEventListener('click', () => selectTask(t.task_id));
    tbody.appendChild(tr);
  }
}

function selectTask(task_id) {
  if (selectedTaskId === task_id) return; // already selected — don't kick off a re-render
  selectedTaskId = task_id;
  $('#detailTaskId').textContent = task_id;
  // 새 task 선택 시엔 강제로 re-render (이전 task의 hash/terminal 캐시 무효화).
  lastDetailHash = '';
  lastDetailTerminal = false;
  loadDetail();
}

// ─────────── Detail panel helpers ───────────

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function safeJson(v) {
  if (v == null) return null;
  if (typeof v === 'object') return v;
  try { return JSON.parse(v); } catch (_) { return null; }
}

/** Area chip class for a (agent_name, target) pair. */
function areaClass(agent, target) {
  const a = String(agent || '').toLowerCase();
  if (a === 'be' || (a === 'lint' && target === 'BE')) return a === 'lint' ? 'lint' : 'be';
  if (a === 'fe' || (a === 'lint' && target === 'FE')) return a === 'lint' ? 'lint' : 'fe';
  if (a === 'orchestrator') return 'orchestrator';
  if (a === 'codechecker')  return 'codechecker';
  if (a === 'deploy')       return 'deploy';
  if (a === 'posttest')     return 'posttest';
  return 'orchestrator';
}

/** Extract the first meaningful line matching `regex` from a multiline blob. */
function extractKeyLine(text, regex, maxLen = 300) {
  const line = String(text || '')
    .split('\n')
    .map((l) => l.trim())
    .find((l) => l && regex.test(l));
  return line ? line.slice(0, maxLen) : '';
}

/** Find the most relevant FAILED run for top-level surfacing.
 *  Orchestrator row is a task-level wrap with no detail — prefer the actual
 *  phase agent that failed (Deploy / PostTest / Lint / BE / FE / CodeChecker).
 *  Falls back to Orchestrator only if no phase agent failed.
 */
function pickFailedRun(runs) {
  if (!runs || runs.length === 0) return null;
  const failed = runs.filter((r) => r.status === 'FAILED');
  if (failed.length === 0) return null;
  // Prefer non-Orchestrator agent rows (they hold the real cause).
  const phaseFail = failed.find((r) => r.agent_name !== 'Orchestrator');
  return phaseFail || failed[0];
}

/** Classify a FAILED log_agent_runs row → severity / category / label / recommendation. */
function classifyRunError(run) {
  const oj = safeJson(run.output_json) || {};
  const err = String(oj.error || '');
  const stack = String(oj.stack || '');
  const agent = String(run.agent_name || '');

  // ===== Deploy (Phase 8) 특수 처리 =====
  // output_json 구조: { failed_stage, error?, compose_output?, logs?: {be,fe}, exit_code, duration_ms }
  if (agent === 'Deploy') {
    const cOut = String(oj.compose_output || '');
    const logs = oj.logs || {};
    const logsBe = String(logs.be || '');
    const logsFe = String(logs.fe || '');
    const allDeploy = err + '\n' + cOut + '\n' + logsBe + '\n' + logsFe;
    const fs = String(oj.failed_stage || '');

    // Docker daemon 다운 (Windows: npipe, Linux: socket) — 가장 흔한 환경 에러
    if (/dockerDesktopLinuxEngine|docker daemon|Cannot connect to the Docker daemon|npipe:\/\/|\/var\/run\/docker\.sock/i.test(allDeploy)) {
      return {
        severity: 'error',
        category: 'DOCKER_DAEMON_DOWN',
        label: '🐳 Docker Desktop 미실행 (데몬 연결 실패)',
        detail: extractKeyLine(allDeploy, /docker|daemon|pipe|sock/i) || 'docker daemon에 연결 실패',
        recommendation: 'Docker Desktop을 시작하세요 (재부팅 후 자동 시작 안 됐을 가능성). 시작 후 `docker info`의 Server 섹션이 나오면 UI의 Redeploy 버튼으로 재시도. 또는 .env의 DEPLOY_MODE=off로 Phase 8/9 skip.',
      };
    }

    if (fs === 'docker_check') {
      return {
        severity: 'error',
        category: 'DOCKER_CHECK_FAILED',
        label: '🐳 Docker CLI/Compose 사전 점검 실패',
        detail: err || 'docker 명령 자체를 사용할 수 없음',
        recommendation: 'Docker Desktop 설치 + PATH 확인. 또는 .env의 DEPLOY_MODE=off로 Phase 8/9 skip.',
      };
    }
    if (fs === 'host_mysql_ping') {
      return {
        severity: 'error',
        category: 'HOST_MYSQL_DOWN',
        label: '🗄 host MySQL 연결 실패',
        detail: err || 'host MySQL ping 실패',
        recommendation: 'host MySQL 서비스 실행 확인 + .env의 DB_HOST/PORT/USER/PASSWORD 검토. 컨테이너는 host.docker.internal로 host MySQL에 접근.',
      };
    }
    if (fs === 'port_preflight') {
      const rp = oj.requested_ports || {};
      return {
        severity: 'error',
        category: 'PORT_CONFLICT',
        label: '🔌 포트 충돌 (preflight fallback 한계 초과)',
        detail: err || `요청 포트: be=${rp.be || '?'} fe=${rp.fe || '?'}`,
        recommendation: '.env의 BE_PORT/FE_PORT 변경 또는 점유 process 종료 (`netstat -ano | findstr :PORT`).',
      };
    }
    if (fs === 'compose_up_timeout') {
      return {
        severity: 'error',
        category: 'COMPOSE_TIMEOUT',
        label: `⏱ compose up timeout (${oj.duration_ms || '?'}ms)`,
        detail: err || 'docker compose up이 timeout 안에 healthy 안 됨',
        recommendation: '이미지 빌드 시간 또는 healthcheck 지연이 원인. DEPLOY_TIMEOUT_MS 늘리거나 Dockerfile 캐시 확인. logs.be/logs.fe 펼쳐 컨테이너 마지막 출력 확인.',
      };
    }
    if (fs === 'compose_up') {
      const firstLine = extractKeyLine(cOut + '\n' + logsBe + '\n' + logsFe, /error|fail|cannot|denied|refused/i)
        || (cOut || logsBe || logsFe || '').split('\n').filter((l) => l.trim())[0] || '';
      return {
        severity: 'error',
        category: 'COMPOSE_UP_FAILED',
        label: `🐳 docker compose up 실패 (exit ${oj.exit_code ?? '?'})`,
        detail: firstLine.slice(0, 300) || err || 'compose up 실패',
        recommendation: 'output_json의 compose_output 또는 logs.{be,fe}를 펼쳐 원본 에러 확인. 흔한 원인: 빌드 실패 / 포트 점유 / mysql healthcheck 실패 / 의존성 설치 실패.',
      };
    }
    // generic Deploy fail
    return {
      severity: 'error',
      category: 'DEPLOY_FAILED',
      label: '🐳 Deploy 실패' + (fs ? ` (${fs})` : ''),
      detail: err || cOut.slice(0, 200) || '(no error message)',
      recommendation: 'output_json 전체 펼쳐 failed_stage·compose_output·logs 확인.',
    };
  }

  // ===== PostTest (Phase 9) 특수 처리 =====
  // 케이스 1 (exception): { pass:false, error, baseUrl }
  // 케이스 2 (endpoint fail): { pass:false, total, passed, results:[per-endpoint] }
  if (agent === 'PostTest') {
    const results = Array.isArray(oj.results) ? oj.results : [];
    // 케이스 1: 예외 (results 없음, error만)
    if (!results.length && err) {
      return {
        severity: 'error',
        category: 'POSTTEST_EXCEPTION',
        label: '🧪 PostTest 실행 예외',
        detail: err,
        recommendation: `BE 컨테이너가 정상 응답하는지 확인 (baseUrl: ${oj.baseUrl || '?'}). curl로 직접 시도 가능. 컨테이너 healthcheck 또는 BE 시작 실패 의심.`,
      };
    }
    // 케이스 2: per-endpoint assertion 실패
    // PostTest output 실제 필드: ep.endpoint (path), ep.method, ep.errors[],
    //   ep.trace.{url,method,status,endpoint,request_body,response_body}.
    // 사용자가 drill-down 없이도 "어느 endpoint가 / 어떤 status 받아서 / 왜 실패"를
    // 한 줄로 볼 수 있게 path + BE 응답 핵심 메시지를 detail에 합쳐 노출.
    const failedEps = results.filter((r) => !r.pass);
    if (failedEps.length > 0) {
      const first = failedEps[0] || {};
      const trace = first.trace || {};
      const errors = Array.isArray(first.errors) ? first.errors : [];
      const firstErr = errors[0] || first.reason || first.error || 'schema mismatch';

      // endpoint 식별자: method + path 조합. PostTest는 ep.endpoint를 path로 emit.
      const path = first.endpoint || trace.endpoint || trace.url || first.path || '';
      const method = first.method || trace.method || '';
      const epLabel = `${method} ${path}`.trim() || 'endpoint';

      // BE 실제 응답의 error/message 필드를 핵심 요약으로 추출
      const respBody = trace.response_body;
      const respErr = (respBody && typeof respBody === 'object')
        ? String(respBody.error || respBody.message || '').trim().slice(0, 120)
        : '';

      let detail = `[${epLabel}] ${firstErr}`;
      if (respErr && !firstErr.includes(respErr)) {
        detail += ` (BE 응답: "${respErr}")`;
      }
      if (failedEps.length > 1) {
        detail += ` 외 ${failedEps.length - 1}개 endpoint 실패`;
      }

      return {
        severity: 'error',
        category: 'POSTTEST_ASSERTION_FAIL',
        label: `🧪 PostTest 실패 (${oj.passed ?? 0}/${oj.total ?? failedEps.length} endpoints)`,
        detail: detail.slice(0, 400),
        recommendation: '상세 보기를 펼쳐 각 endpoint의 trace(status, response_body)와 errors 확인. 흔한 원인: BE 응답 status가 api_contract에 선언 안 됨 / 응답 schema 불일치 / 필드명·타입 차이 / 인증 누락(401).',
      };
    }
    return {
      severity: 'error',
      category: 'POSTTEST_FAILED',
      label: '🧪 PostTest 실패',
      detail: err || '(no detail)',
      recommendation: 'output_json 전체 펼쳐서 확인.',
    };
  }

  // ===== 기존 LLM Agent 류 분류 =====
  const all = err + '\n' + stack;

  // UNAUTHORIZED_DEPS — validateAllowedDeps throw
  if (/UNAUTHORIZED_DEPS/i.test(all) || /Unauthorized dependencies/i.test(err)) {
    const m = err.match(/Unauthorized dependencies detected:\s*([^.]+)\./i);
    return {
      severity: 'error',
      category: 'UNAUTHORIZED_DEPS',
      label: '🚫 미허가 의존성 (allowedDeps 위반)',
      detail: m ? m[1].trim() : err,
      recommendation: 'rules/*.md에 그 패키지 명시 금지 추가하거나, 정말 필요하면 lib/stack.config.json의 allowedDeps 확장. 보통은 prompt를 더 명확히 — bcrypt vs bcryptjs 같은 함정은 rules에 NOT 표기 추가.',
    };
  }
  // validatePaths throw — protected file or outside BE/FE
  if (/protected stack config file/i.test(all) || /Disallowed path/i.test(all) || /not in allowed_paths/i.test(all)) {
    return {
      severity: 'error',
      category: 'PROTECTED_PATH',
      label: '🛡 Protected 파일 / 영역 침범',
      detail: err,
      recommendation: 'LLM이 package.json·vite.config·.eslintrc 같은 보호 파일에 쓰려 함. rules/common.md §9 보호 파일 항목 강조 또는 lib/stack.config.json protectedConfigFiles 점검.',
    };
  }
  // LLM_TRUNCATED — callJSON throws this
  if (/LLM_TRUNCATED/i.test(all) || /TRUNCATED after/i.test(err)) {
    return {
      severity: 'warn',
      category: 'LLM_TRUNCATED',
      label: '✂️ LLM 응답 잘림 (max_tokens 초과)',
      detail: err,
      recommendation: 'agent별 max_tokens 증가 또는 prompt 단축. lib/llm.js의 Continuation pattern이 3회 누적 후에도 실패하면 여기 도달.',
    };
  }
  // JSON parse fail
  if (/did not return valid JSON/i.test(all) || /JSON.*parse/i.test(all)) {
    return {
      severity: 'warn',
      category: 'JSON_PARSE_FAIL',
      label: '📝 LLM JSON 응답 파싱 실패',
      detail: err,
      recommendation: 'callJSON에 retry layer 있음 — 그래도 실패면 raw 응답 dump 위치 확인 (Temp 디렉터리). prompt에 escape 가이드 강화 가능.',
    };
  }
  // Docker not installed
  if (/Docker CLI not installed/i.test(all) || /Docker Compose not available/i.test(all)) {
    return {
      severity: 'error',
      category: 'DOCKER_MISSING',
      label: '🐳 Docker 미설치 / 미실행',
      detail: err,
      recommendation: 'Docker Desktop 설치 + 실행 확인. 또는 .env에서 DEPLOY_MODE=off로 Phase 8/9 skip.',
    };
  }
  // Generic agent exception
  return {
    severity: 'error',
    category: 'AGENT_EXCEPTION',
    label: '❌ Agent 예외',
    detail: err || '(no error message)',
    recommendation: 'output_json.stack을 펼쳐 자세한 호출 위치 확인.',
  };
}

/** Deploy/PostTest run's failed_stage → label. */
function classifyDeployStage(failedStage) {
  switch (failedStage) {
    case 'docker_check':       return { label: '🐳 Docker 미설치', sev: 'error' };
    case 'port_preflight':     return { label: '🔌 Port 충돌 (fallback 한계 초과)', sev: 'error' };
    case 'compose_up':         return { label: '🐳 compose up 실패', sev: 'error' };
    case 'compose_up_timeout': return { label: '⏱ compose up timeout', sev: 'error' };
    default:                   return { label: failedStage || 'Deploy 실패', sev: 'error' };
  }
}

/** Lint failed_stage → label. */
function classifyLintStage(failedStage) {
  switch (failedStage) {
    case 'STAGE1': return { label: '🔧 Lint Stage 1 (eslint) 실패', sev: 'info', retryable: true };
    case 'STAGE2': return { label: '🔧 Lint Stage 2 (build/syntax) 실패', sev: 'info', retryable: true };
    case 'STAGE3': return { label: '🧪 Lint Stage 3 (tests) 실패 — retry 없음', sev: 'error', retryable: false };
    default:       return { label: failedStage || 'Lint 실패', sev: 'warn', retryable: false };
  }
}

/** Render a single error card. */
function renderErrCard(c) {
  const detailHtml = c.detail
    ? `<div class="err-body"><p><code>${esc(c.detail)}</code></p></div>`
    : '';
  const recoHtml = c.recommendation
    ? `<div class="err-reco"><b>권장 대응:</b> ${esc(c.recommendation)}</div>`
    : '';
  return `
    <div class="err-card sev-${c.severity}">
      <div class="err-head">
        <span class="err-title">${esc(c.label)}</span>
      </div>
      ${detailHtml}
      ${recoHtml}
    </div>`;
}

/** Render a code block disclosure for big text (stdout/stderr/stack). */
function renderCodeDisclosure(summary, text, opts = {}) {
  if (!text || !String(text).trim()) return '';
  const wrapCls = opts.wrap === false ? '' : ' wrap';
  return `
    <details class="disclosure">
      <summary>${esc(summary)}</summary>
      <div class="disclosure-body"><div class="code-block${wrapCls}">${esc(text)}</div></div>
    </details>`;
}

/** Render meta chips for silent warnings on SUCCESS Agent runs. */
function renderMetaChips(oj) {
  const chips = [];
  if (Array.isArray(oj.dropped_protected) && oj.dropped_protected.length) {
    chips.push(`<span class="meta-chip warn" title="LLM 응답에 protected file 있었지만 silent drop됨">drop_protected: ${oj.dropped_protected.length}</span>`);
  }
  if (Array.isArray(oj.dropped_tests) && oj.dropped_tests.length) {
    chips.push(`<span class="meta-chip" title="LLM이 만든 test 파일은 시스템이 결정론적으로 자동 생성하므로 silent drop됨">drop_tests: ${oj.dropped_tests.length}</span>`);
  }
  if (Array.isArray(oj.auto_generated_tests) && oj.auto_generated_tests.length) {
    chips.push(`<span class="meta-chip" title="lib/test_codegen.js가 결정론적으로 만든 smoke test">auto_tests: ${oj.auto_generated_tests.length}</span>`);
  }
  if (oj.eslintrc_created) {
    chips.push(`<span class="meta-chip">eslintrc 생성</span>`);
  }
  if (oj.skipped) {
    chips.push(`<span class="meta-chip">skipped: ${esc(oj.skipped)}</span>`);
  }
  if (oj.ports_changed) {
    chips.push(`<span class="meta-chip warn" title="port preflight fallback 발생">ports_changed</span>`);
  }
  return chips.length > 0 ? `<div style="margin-top: 4px;">${chips.join(' ')}</div>` : '';
}

/**
 * (B) Render the top-of-panel "최종 결과" banner.
 *
 * 항상 표시 (verdict 무관) — Detail panel을 열자마자 사용자가 한눈에:
 *   - verdict pill
 *   - orchestrator가 결정한 최종 메시지 (final_result_text)
 *   - ERROR/FAIL이면 첫 FAILED run의 에러 메시지 한 줄 요약 (drill-down 없이)
 *   - 진행 중이면 retry 정보
 *
 * 이전 구현은 ERROR/FAIL일 때만 분류 카드를 띄웠고 final_result_text는
 * fallback이라 묻혀서 안 보였음. 이제 둘 다 같은 카드 안에 노출.
 */
function renderFinalResultCard(decision, states, runs) {
  if (!decision) return '';
  const v = decision.final_verdict || 'IN_PROGRESS';
  const cls = `v-${esc(v)}`;
  const titleMap = {
    PASS:        '✅ PASS — 모든 phase 통과',
    SUCCESS:     '✅ SUCCESS',
    ERROR:       '🚨 ERROR — Agent 예외로 phase 중단',
    FAIL:        '❌ FAIL — 검증 단계에서 실패',
    FAILED:      '❌ FAILED',
    IN_PROGRESS: '⏳ IN_PROGRESS — 아직 실행 중',
    RUNNING:     '⏳ RUNNING',
  };
  const title = titleMap[v] || v;

  // 최종 결과 메시지 후보: final_result_text가 우선이되, 그게 generic 안내문
  // ("see ... output_json for details")이면 classified detail로 *보강*해서 drill-down
  // 없이도 진짜 원인이 보이도록. final_result_text 자체가 없으면 분류 결과로 대체.
  let msg = (decision.final_result_text || '').trim();
  const isGenericMsg = /see\s+.*output_json\s+for\s+details/i.test(msg)
    || /see\s+\w+\s+run\s+output_json/i.test(msg);
  if ((!msg || isGenericMsg) && (v === 'ERROR' || v === 'FAIL')) {
    const failedRun = pickFailedRun(runs);
    if (failedRun) {
      const c = classifyRunError(failedRun);
      const tgt = failedRun.target ? ` / ${failedRun.target}` : '';
      const enriched = `[${failedRun.agent_name}${tgt}] ${c.label}\n${c.detail || ''}`.trim();
      msg = isGenericMsg ? `${msg}\n\n${enriched}` : enriched;
    } else {
      const failedState = (states || []).find((s) => s.status === 'FAILED');
      if (failedState) {
        const c = classifyLintStage(failedState.failed_stage);
        const enriched = `[Lint / ${failedState.target}] ${c.label} (retry ${failedState.retry_count})`;
        msg = isGenericMsg ? `${msg}\n\n${enriched}` : enriched;
      }
    }
  }

  const metaBits = [];
  if (decision.updated_at) metaBits.push(`updated_at=${fmtTime(decision.updated_at)}`);
  if (decision.task_id) metaBits.push(`task_id=${esc(decision.task_id)}`);
  const meta = metaBits.length ? `<div class="final-meta">${metaBits.join(' · ')}</div>` : '';

  return `
    <div class="final-card ${cls}">
      <div class="final-head">
        ${pill(v)}
        <span class="final-title">${esc(title)}</span>
      </div>
      ${msg ? `<div class="final-msg">${esc(msg)}</div>` : ''}
      ${meta}
    </div>`;
}

/** Render the most-critical error summary card on top (Layer 1). */
function renderTopErrorSummary(decision, states, runs) {
  if (!decision) return '';
  if (decision.final_verdict !== 'ERROR' && decision.final_verdict !== 'FAIL') return '';

  // Pick the most informative FAILED run — Orchestrator는 task-level wrap이라
  // detail이 없으니 실제 phase agent(Deploy/PostTest/Lint/BE/FE/CodeChecker)를 우선.
  const failedRun = pickFailedRun(runs);
  if (failedRun) {
    const c = classifyRunError(failedRun);
    const area = areaClass(failedRun.agent_name, failedRun.target);
    const tgt = failedRun.target ? ' / ' + failedRun.target : '';
    return `
      <div class="err-card sev-${c.severity}" style="margin-top: 10px;">
        <div class="err-head">
          <span class="area-chip ${area}">${esc(failedRun.agent_name)}${esc(tgt)}</span>
          <span class="err-title">${esc(c.label)}</span>
        </div>
        ${c.detail ? `<div class="err-body"><p><code>${esc(c.detail)}</code></p></div>` : ''}
        ${c.recommendation ? `<div class="err-reco"><b>권장 대응:</b> ${esc(c.recommendation)}</div>` : ''}
      </div>`;
  }

  // No exception → FAIL from Lint stage3 or retry exhaustion. Surface the
  // first FAILED task_state.
  const failedState = (states || []).find((s) => s.status === 'FAILED');
  if (failedState) {
    const c = classifyLintStage(failedState.failed_stage);
    return `
      <div class="err-card sev-${c.sev}" style="margin-top: 10px;">
        <div class="err-head">
          <span class="area-chip lint">Lint / ${esc(failedState.target)}</span>
          <span class="err-title">${esc(c.label)} (retry ${failedState.retry_count})</span>
        </div>
        <div class="err-body"><p>실패한 영역: <code>${esc(failedState.target)}</code></p></div>
        <div class="err-reco"><b>권장 대응:</b> ${c.retryable
          ? 'retry로 자동 회복 시도 중. retry_count가 MAX(3) 도달하면 verdict=FAIL.'
          : 'Stage 3 (tests) 실패는 retry 없이 즉시 FAIL. 비즈니스 로직 점검 필요.'}</div>
      </div>`;
  }

  // Fallback — generic.
  if (decision.final_result_text) {
    return `
      <div class="err-card sev-error" style="margin-top: 10px;">
        <div class="err-head"><span class="err-title">${esc(decision.final_verdict)}</span></div>
        <div class="err-body"><div class="code-block wrap">${esc(decision.final_result_text)}</div></div>
      </div>`;
  }
  return '';
}

/** Render the run timeline (Layer 2) — each row coloured by severity + area chip + expand. */
function renderTimeline(runs) {
  if (!runs || runs.length === 0) return '';
  const rows = runs.map((r, idx) => {
    const oj = safeJson(r.output_json) || {};
    const area = areaClass(r.agent_name, r.target);
    const tgt = r.target ? `<span class="target">/ ${esc(r.target)}</span>` : '';
    const sev = r.status === 'FAILED' ? 'sev-error'
              : r.status === 'RUNNING' ? 'sev-info'
              : 'sev-ok';
    const ts = `${fmtTime(r.started_at)} → ${r.ended_at ? fmtTime(r.ended_at) : '...'}`;

    let expand = '';
    if (r.status === 'FAILED') {
      // Exception path — render full error card + stack disclosure
      const c = classifyRunError(r);
      expand += renderErrCard(c);
      if (oj.stack) expand += renderCodeDisclosure('▼ stack trace', oj.stack, { wrap: true });

      // Deploy-specific: failed_stage + compose_output + per-service logs
      if (r.agent_name === 'Deploy') {
        const ds = classifyDeployStage(oj.failed_stage);
        expand += `<div class="err-card sev-${ds.sev}"><div class="err-head"><span class="err-title">${esc(ds.label)}</span></div></div>`;
        if (oj.compose_output) expand += renderCodeDisclosure('▼ compose output (tail)', oj.compose_output);
        if (oj.logs) {
          for (const svc of Object.keys(oj.logs)) {
            if (oj.logs[svc]) expand += renderCodeDisclosure(`▼ logs.${svc}`, oj.logs[svc]);
          }
        }
      }
      // PostTest-specific: per-endpoint trace
      if (r.agent_name === 'PostTest' && Array.isArray(oj.results)) {
        for (const ep of oj.results) {
          if (ep.pass) continue;
          const errs = (ep.errors || []).map((e) => `• ${esc(e)}`).join('<br>');
          const trace = ep.trace || {};
          expand += `
            <div class="err-card sev-error">
              <div class="err-head"><span class="area-chip posttest">PostTest</span><span class="err-title">${esc(ep.method || '')} ${esc(ep.endpoint || '')}</span></div>
              <div class="err-body">
                <p>url: <code>${esc(trace.url || '')}</code></p>
                <p>status: <code>${esc(trace.status)}</code></p>
                ${errs ? `<p>${errs}</p>` : ''}
                ${trace.request_body  ? renderCodeDisclosure('▼ request body',  JSON.stringify(trace.request_body, null, 2))  : ''}
                ${trace.response_body ? renderCodeDisclosure('▼ response body', JSON.stringify(trace.response_body, null, 2)) : ''}
              </div>
            </div>`;
        }
      }
    } else if (r.status === 'SUCCESS') {
      // Layer 3: silent warnings as chips
      const chips = renderMetaChips(oj);
      if (chips) expand += chips;
      // Compact summary for Deploy / PostTest success
      if (r.agent_name === 'Deploy' && oj.ports) {
        expand += `<div class="muted" style="font-size:11px; margin-top:4px;">ports: be=${oj.ports.be} fe=${oj.ports.fe} · up in ${oj.duration_ms}ms</div>`;
      }
      if (r.agent_name === 'PostTest' && oj.total != null) {
        expand += `<div class="muted" style="font-size:11px; margin-top:4px;">${oj.passed}/${oj.total} endpoints · ${oj.duration_ms}ms · baseUrl=${esc(oj.baseUrl || '')}</div>`;
      }
    }

    const expandWrapped = expand
      ? `<details class="disclosure" data-runidx="${idx}"><summary>상세 보기</summary><div class="disclosure-body">${expand}</div></details>`
      : '';

    return `
      <div class="run-row ${sev}">
        <span class="area-chip ${area}">${esc(r.agent_name)}</span>
        ${tgt}
        <span>${pill(r.status)}</span>
        <span class="ts">${ts}</span>
      </div>
      ${expandWrapped}`;
  });
  return `<h2 style="margin-top: 14px;">타임라인 (Phase 1~9)</h2><div class="timeline">${rows.join('')}</div>`;
}

/** Render task_state rows with stage_logs disclosure (Lint stage details). */
function renderStates(states) {
  if (!states || states.length === 0) return '';
  const rows = states.map((s) => {
    const cls = areaClass('lint', s.target);
    const sev = s.status === 'FAILED' ? 'sev-error'
              : s.status === 'SUCCESS' ? 'sev-ok'
              : 'sev-info';
    let detail = '';
    if (s.status === 'FAILED') {
      const ls = classifyLintStage(s.failed_stage);
      const sl = safeJson(s.stage_logs);
      detail += `<div class="err-card sev-${ls.sev}"><div class="err-head"><span class="err-title">${esc(ls.label)} · retry ${s.retry_count}/3</span></div></div>`;
      if (sl) {
        for (const stage of ['stage1', 'stage2', 'stage3']) {
          const x = sl[stage];
          if (!x) continue;
          const head = `${stage}: ${x.pass ? '✓ pass' : '✗ fail'} · exit ${x.code} · ${esc(x.cmd || '')}`;
          let body = '';
          if (x.stdout) body += `<b>stdout:</b><div class="code-block">${esc(x.stdout)}</div>`;
          if (x.stderr) body += `<b>stderr:</b><div class="code-block">${esc(x.stderr)}</div>`;
          detail += `<details class="disclosure"><summary>${head}</summary><div class="disclosure-body">${body || '<span class="dim">(empty)</span>'}</div></details>`;
        }
      }
      if (s.fix_instructions) {
        detail += renderCodeDisclosure('▼ 다음 라운드 BE/FE Agent에 전달될 fix_instructions', s.fix_instructions);
      }
    }
    return `
      <div class="run-row ${sev}">
        <span class="area-chip ${cls}">Lint</span>
        <span class="target">/ ${esc(s.target)}</span>
        <span>${pill(s.status)}</span>
        <span class="target">retry ${s.retry_count}${s.failed_stage ? ' · ' + esc(s.failed_stage) : ''}</span>
        <span class="ts">${fmtTime(s.updated_at)}</span>
      </div>
      ${detail ? `<details class="disclosure"><summary>Lint 상세</summary><div class="disclosure-body">${detail}</div></details>` : ''}`;
  });
  return `<h2 style="margin-top: 14px;">TASK_STATE (영역별)</h2><div class="timeline">${rows.join('')}</div>`;
}

async function loadDetail() {
  if (!selectedTaskId) return;
  // Terminal 상태(verdict 확정)면 더 변할 일 없으니 polling 자체를 건너뜀.
  // 펼친 disclosure가 그대로 살아남는다.
  if (lastDetailTerminal) return;

  const data = await fetchJSON(`/api/tasks/${encodeURIComponent(selectedTaskId)}`);
  const { decision, states, runs } = data;

  // 직전 응답과 비교 — RUNNING 중에도 의미 있는 변화가 없으면 re-render skip.
  // runs/states는 timestamp 일부만 fingerprint에 포함 (id+status면 충분).
  const fingerprint = JSON.stringify({
    d: decision && {
      v: decision.final_verdict,
      t: decision.final_result_text,
      u: decision.updated_at,
    },
    s: (states || []).map((s) => [s.id, s.target, s.status, s.retry_count, s.failed_stage]),
    r: (runs || []).map((r) => [r.id, r.agent_name, r.target, r.status, r.ended_at]),
  });
  if (fingerprint === lastDetailHash) return;
  lastDetailHash = fingerprint;

  const root = $('#detail');
  let html = '';

  // (B) "최종 결과" 큰 카드 — verdict + final_result_text를 가장 위에 풀 노출.
  html += renderFinalResultCard(decision, states, runs);

  if (!decision) {
    html += '<div class="muted" style="margin-top: 8px;">(아직 log_agent_decisions row 없음 — orchestrator가 Phase 1 진입 전이거나, 일반 cycle이 아닌 manual 작업[Redeploy 등])</div>';
  }

  // Layer 1 — drill-down용 분류 카드 (final-card와 중복일 수 있지만 권장 대응이 같이 보임).
  html += renderTopErrorSummary(decision, states, runs);

  // Deploy run with ports → "FE/BE 열기" + "Stop containers" strip (existing).
  const deployRun = (runs || []).find((r) => r.agent_name === 'Deploy' && r.status === 'SUCCESS');
  if (deployRun) {
    const oj = safeJson(deployRun.output_json) || {};
    if (oj.ports && !oj.skipped) {
      const { fe, be } = oj.ports;
      html += `
        <div class="err-card sev-ok" style="margin-top: 10px;">
          <div class="err-head"><span class="err-title">배포된 서비스 (DEPLOY_TEARDOWN_ON_PASS=off일 때 PASS 후에도 유지)</span></div>
          <div class="err-body">
            <a href="http://${PUBLIC_HOST}:${fe}" target="_blank" rel="noopener" style="margin-right: 12px; color: var(--accent); font-weight: 600;">🌐 FE 열기 (:${fe})</a>
            <a href="http://${PUBLIC_HOST}:${be}" target="_blank" rel="noopener" style="margin-right: 12px; color: var(--accent); font-weight: 600;">🔌 BE 열기 (:${be})</a>
            <button class="secondary" id="stopContainersBtn" style="margin-left: 6px;">🛑 Stop containers</button>
          </div>
        </div>`;
    }
  }

  // Layer 2 — timeline with per-run area chip + severity colour + expand
  html += renderTimeline(runs);

  // task_state rows (Lint) with stage_logs disclosure
  html += renderStates(states);

  root.innerHTML = html;

  // verdict가 확정되면 이후 polling이 detail을 건드리지 않도록 잠금.
  // selectTask()가 호출되면 이 잠금이 해제된다.
  if (decision && ['PASS', 'FAIL', 'ERROR', 'SUCCESS', 'FAILED'].includes(decision.final_verdict)) {
    lastDetailTerminal = true;
  }

  // Bind Stop containers button if it was rendered.
  const stopBtn = document.getElementById('stopContainersBtn');
  if (stopBtn) {
    stopBtn.addEventListener('click', async () => {
      if (!confirm('현재 워크트리의 docker compose down 실행. 계속할까요?')) return;
      stopBtn.disabled = true;
      stopBtn.textContent = '🛑 stopping…';
      try {
        const r = await fetchJSON('/api/stop-containers', { method: 'POST' });
        stopBtn.textContent = r.ok ? '🛑 stopped' : '🛑 failed';
      } catch (_) { stopBtn.textContent = '🛑 failed'; }
      setTimeout(() => { stopBtn.disabled = false; stopBtn.textContent = '🛑 Stop containers'; }, 1800);
    });
  }
}

async function pollRunStatus() {
  const r = await fetchJSON('/api/run');
  if (r.running) {
    const cur = r.current || {};
    const elapsed = cur.startedAt ? Math.round((Date.now() - cur.startedAt) / 1000) : 0;
    $('#runStatus').innerHTML =
      `<span class="pill RUNNING">RUNNING</span> pid=${cur.pid || '?'} ` +
      `task_id=${cur.task_id || '(starting...)'} ` +
      `elapsed=${elapsed}s`;
    $('#runBtn').disabled = true;
    if (cur.task_id && cur.task_id !== selectedTaskId) selectTask(cur.task_id);
    return;
  }
  $('#runBtn').disabled = false;

  // (A) idle일 때 마지막 task의 verdict + 짧은 에러 메시지를 노출 — 시선
  // 1순위 영역인데 "idle"만 보였던 것을 보완. 클릭하면 detail panel로 점프.
  // loadTasks 결과를 그대로 활용 (별도 fetch 없음).
  const lastTaskRow = document.querySelector('#taskTable tbody tr');
  if (!lastTaskRow) {
    $('#runStatus').textContent = 'idle';
    return;
  }
  const v = (lastTaskRow.className.match(/verdict-(\S+)/) || [])[1] || '';
  const tid = lastTaskRow.children[1]?.textContent || '';
  let snippet = '';
  if (v === 'ERROR' || v === 'FAIL' || v === 'FAILED') {
    snippet = ' — 자세한 에러 메시지는 우측 상세 패널 최상단 카드 참고';
  } else if (v === 'PASS' || v === 'SUCCESS') {
    snippet = ' — 통과';
  }
  $('#runStatus').innerHTML =
    `idle &nbsp;|&nbsp; 마지막 task: ${pill(v)} ` +
    `<a href="#" id="runStatusJump" style="font-family: ui-monospace, monospace; font-size: 11px; color: var(--accent);">${esc(tid)}</a>` +
    `<span class="muted">${esc(snippet)}</span>`;
  const jump = document.getElementById('runStatusJump');
  if (jump && tid) {
    jump.addEventListener('click', (e) => { e.preventDefault(); selectTask(tid); });
  }
}

/**
 * Redeploy 실행 + 결과 처리 + 성공 시 FE 페이지를 새 탭에 자동 오픈.
 *
 * 두 발화점에서 공유:
 *   - 🚀 Redeploy 버튼 클릭 (수동)
 *   - ⏮ Reset to origin/main 성공 직후 (자동 chain) — git/컨테이너 상태
 *     mismatch 방지. reset만 하고 redeploy 안 하면 컨테이너는 옛 코드로
 *     떠 있어 git와 동작이 어긋남.
 *
 * @param {{ context: 'manual' | 'after-rollback' }} opts
 * @returns {Promise<{ok: boolean}>}
 */
async function executeRedeploy(opts = { context: 'manual' }) {
  const r = await fetchJSON('/api/redeploy', { method: 'POST' });
  if (r.ok) {
    const p = r.ports || {};
    const feUrl = `http://${PUBLIC_HOST}:${p.fe}`;
    const beUrl = `http://${PUBLIC_HOST}:${p.be}`;
    const prefix = opts.context === 'after-rollback'
      ? 'Rollback 후 Redeploy 완료'
      : 'Redeploy 완료';
    alert(
      `${prefix} (task_id=${r.task_id})\n\n` +
      `🌐 FE: ${feUrl}\n` +
      `🔌 BE: ${beUrl}\n\n` +
      `확인을 누르면 FE 페이지를 새 탭에 띄웁니다.`
    );
    // alert 동기 종료 직후 user-gesture 컨텍스트가 살아있어 popup blocker
    // 통과. noopener는 새 창에서 opener를 못 만지게 하는 보안 best practice.
    window.open(feUrl, '_blank', 'noopener');
  } else if (r._status === 400) {
    // DEPLOY_MODE=off rejection — surface server message verbatim.
    alert(r.error || 'Redeploy 거부됨 (DEPLOY_MODE=off).');
  } else if (r._status === 409) {
    alert(r.error || '다른 작업 진행 중. 끝난 후 다시 시도하세요.');
  } else {
    alert('Redeploy 실패: ' + (r.error || r._text || 'unknown'));
  }
  return r;
}

$('#rollbackBtn').addEventListener('click', async () => {
  $('#rollbackBtn').disabled = true;
  $('#rollbackBtn').textContent = '⏮ checking…';
  try {
    const p = await fetchJSON('/api/rollback-preview');
    const ahead = p.ahead_commits || [];
    const dirty = p.dirty_files || [];
    if (!p.can_rollback) {
      alert('롤백할 변경사항 없음 — 이미 origin/main 상태입니다.');
      return;
    }
    // .env 복원 단계 안내. 백업이 있고 복원 가능한 키가 있으면 secret이
    // 자동 복원됨을 명시 — 사용자가 옛 UX(수동 재입력) 가정으로 멈칫하지
    // 않도록.
    let envMsg;
    if (!p.env_will_reset) {
      envMsg = '\n\n.env.example을 찾지 못해 .env는 그대로 유지됩니다.';
    } else if (p.backup_exists && p.restorable_key_count > 0) {
      envMsg =
        `\n\n.env는 .env.example 구조로 reset되고, ` +
        `UI 시작 시 만든 .env.backup의 ${p.restorable_key_count}개 값(secret 포함)으로 자동 복원됩니다.`;
    } else {
      envMsg =
        '\n\n.env는 .env.example로 reset됩니다. .env.backup이 없거나 비어있어 ' +
        'ANTHROPIC_API_KEY · DB_PASSWORD 등을 다시 입력해야 합니다.';
    }
    const msg =
      '⚠ origin/main 상태로 되돌립니다. 작업 손실 위험이 있습니다.\n\n' +
      `로컬 commit ${ahead.length}개가 사라짐:\n` +
      (ahead.slice(0, 8).map((c) => '  • ' + c).join('\n') || '  (없음)') +
      (ahead.length > 8 ? `\n  ... 외 ${ahead.length - 8}개` : '') +
      `\n\n작업 트리에서 정리될 파일 ${dirty.length}개:\n` +
      (dirty.slice(0, 8).map((f) => '  • ' + f).join('\n') || '  (없음)') +
      (dirty.length > 8 ? `\n  ... 외 ${dirty.length - 8}개` : '') +
      envMsg +
      '\n\nReset 완료 후 자동으로 Redeploy까지 진행해 컨테이너도 origin/main 코드로 재빌드합니다.' +
      '\n\n정말 진행할까요?';
    if (!confirm(msg)) return;
    $('#rollbackBtn').textContent = '⏮ resetting…';
    const r = await fetchJSON('/api/rollback', { method: 'POST' });
    if (!r.ok) {
      alert('Rollback 실패: ' + (r.error || r._text || 'unknown'));
      return;
    }
    // Reload — .env / BE / FE / tasks 모두 변경됨.
    await Promise.all([loadEnv(), loadTasks()]);
    loadDetail();
    // 자동 chain: rollback 완료 후 즉시 redeploy. git와 컨테이너 상태 mismatch
    // 방지 — reset만 하고 컨테이너는 옛 코드로 떠 있는 사고를 차단.
    $('#rollbackBtn').textContent = '⏮ → 🚀 redeploying…';
    await executeRedeploy({ context: 'after-rollback' });
  } catch (e) {
    alert('Rollback 호출 실패: ' + e.message);
  } finally {
    $('#rollbackBtn').disabled = false;
    $('#rollbackBtn').textContent = '⏮ Reset to origin/main';
  }
});

/**
 * Merge to main 버튼의 enable/disable 상태를 polling으로 동기화.
 *
 * - ahead commit이 없거나 / dirty가 있거나 / ff 불가하면 → button.disabled=true,
 *   title 속성에 사유 표기 (마우스 호버 시 tooltip).
 * - 사용자가 commit하면 다음 polling cycle(1.5s)에 자동으로 활성화.
 *
 * ?fetch=0 옵션으로 git fetch는 생략 — 네트워크 round-trip 부담을 피한다.
 * 사용자가 실제 클릭하는 시점엔 click handler에서 fetch 포함된 preview를
 * 다시 호출해 freshness를 보장.
 */
async function pollMergeStatus() {
  const btn = $('#mergeBtn');
  if (!btn) return;
  try {
    const p = await fetchJSON('/api/merge-preview?fetch=0');
    if (p.can_merge) {
      btn.disabled = false;
      const aheadCount = (p.ahead_commits || []).length;
      btn.title = `${p.branch} → origin/main fast-forward (${aheadCount}개 commit)`;
    } else {
      btn.disabled = true;
      btn.title = p.reason || 'merge 불가 상태';
    }
  } catch (_) {
    // API 실패 시엔 안전을 위해 disabled 유지 (이미 disabled면 그대로).
    btn.disabled = true;
    btn.title = 'merge 상태 확인 실패';
  }
}

$('#mergeBtn').addEventListener('click', async () => {
  $('#mergeBtn').disabled = true;
  $('#mergeBtn').textContent = '🔀 checking…';
  try {
    // 클릭 시엔 query 없이 호출 → fresh fetch + 정확한 사유. polling은 fetch=0
    // 으로 경량이지만, 사용자가 직접 행동하는 순간엔 최신 origin/main을 확인.
    const p = await fetchJSON('/api/merge-preview');
    if (!p.can_merge) {
      // 사유별로 더 친절한 alert (어떤 파일이 dirty인지 / ff 안 되면 어떻게 풀지).
      let msg = 'Merge 불가\n\n사유: ' + (p.reason || '알 수 없음');
      if (p.dirty_files && p.dirty_files.length > 0) {
        msg += `\n\ncommit 안 된 파일 ${p.dirty_files.length}개:\n` +
          p.dirty_files.slice(0, 8).map((f) => '  • ' + f).join('\n') +
          (p.dirty_files.length > 8 ? `\n  ... 외 ${p.dirty_files.length - 8}개` : '') +
          '\n\n→ 먼저 git commit 또는 정리 후 다시 시도하세요.';
      } else if (!p.ff_possible) {
        msg += '\n\n→ 해결 방법:\n' +
          '  • 로컬에서 git rebase origin/main 후 충돌 해결\n' +
          '  • 또는 GitHub에서 PR을 만들어 머지';
      } else if (p.ahead_commits && p.ahead_commits.length === 0) {
        msg += '\n\n→ 새로 commit한 뒤에만 Merge 버튼이 활성화됩니다.';
      }
      if (p.ahead_commits && p.ahead_commits.length > 0) {
        msg += `\n\n현재 ahead commit ${p.ahead_commits.length}개:\n` +
          p.ahead_commits.slice(0, 5).map((c) => '  • ' + c).join('\n');
      }
      alert(msg);
      return;
    }
    const ahead = p.ahead_commits || [];
    const msg =
      `🔀 ${p.branch} → origin/main fast-forward merge\n\n` +
      `1) git push origin ${p.branch}\n` +
      `2) git push origin ${p.branch}:main\n\n` +
      `다음 ${ahead.length}개 commit이 origin/main으로 전진:\n` +
      ahead.slice(0, 10).map((c) => '  • ' + c).join('\n') +
      (ahead.length > 10 ? `\n  ... 외 ${ahead.length - 10}개` : '') +
      '\n\nforce push 아닌 fast-forward만 시도합니다. 진행할까요?';
    if (!confirm(msg)) return;
    $('#mergeBtn').textContent = '🔀 merging…';
    const r = await fetchJSON('/api/merge', { method: 'POST' });
    if (r.ok) {
      const lines = [
        r.no_op ? '✓ 이미 동기화 상태' : `✓ Merge 완료 (${r.pushed_commits ? r.pushed_commits.length : 0}개 commit)`,
        r.pushed_branch ? `  • origin/${r.branch} push 완료` : '',
        r.merged_to_main ? '  • origin/main fast-forward 완료' : '',
        '',
        r.notice || '',
      ].filter(Boolean);
      alert(lines.join('\n'));
    } else {
      // 부분 성공 케이스 (branch는 push됐는데 main push 실패) 명시
      const partial = r.pushed_branch && !r.merged_to_main
        ? `\n\n(부분 성공: origin/${p.branch}는 push됐지만 origin/main ff는 실패)`
        : '';
      alert('Merge 실패: ' + (r.error || r._text || 'unknown') + partial);
    }
  } catch (e) {
    alert('Merge 호출 실패: ' + e.message);
  } finally {
    $('#mergeBtn').disabled = false;
    $('#mergeBtn').textContent = '🔀 Merge to main';
  }
});

(async function main() {
  await Promise.all([loadEnv(), loadTasks()]);
  setInterval(() => { loadTasks(); loadDetail(); pollRunStatus(); pollMergeStatus(); }, 1500);
  pollRunStatus();
  pollMergeStatus();
})();
</script>
</body>
